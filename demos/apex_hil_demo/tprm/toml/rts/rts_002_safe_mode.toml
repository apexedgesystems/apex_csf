# ==============================================================================
# Step 3: Wait until thrust.z == 0.0 (wait condition with GOTO on timeout)
#   No action (DATA_WRITE with passthrough masks). The step is just a gate.
#   Wait condition: HilPlantModel OUTPUT offset 8, 4 bytes, EQ, FLOAT32
#   Threshold = 0.0 (all zeros as float32 LE)
#   Timeout: 500 cycles (5 seconds). On timeout: GOTO step 5 (failure).
# ==============================================================================
[StandaloneSequenceTprm.step_3]
targetFullUid    = { type = "uint", size = 4, value = "0x7800" }
targetCategory   = { type = "uint", size = 1, value = "OUTPUT" }
targetByteOffset = { type = "uint", size = 2, value = 8 }
targetByteLen    = { type = "uint", size = 1, value = 4 }
actionType       = { type = "uint", size = 1, value = "DATA_WRITE" }
armTarget        = { type = "uint", size = 1, value = 0 }
