delayCycles      = { type = "uint", size = 4, value = 10 }
timeoutCycles    = { type = "uint", size = 4, value = 500 }
onTimeout        = { type = "uint", size = 1, value = "GOTO_STEP" }
onComplete       = { type = "uint", size = 1, value = "NEXT" }
gotoStep         = { type = "uint", size = 1, value = 5 }
retryMax         = { type = "uint", size = 1, value = 0 }
[StandaloneSequenceTprm.step_3.waitCondition]
targetFullUid    = { type = "uint", size = 4, value = "0x7800" }
targetCategory   = { type = "uint", size = 1, value = "OUTPUT" }
targetByteOffset = { type = "uint", size = 2, value = 8 }
targetByteLen    = { type = "uint", size = 1, value = 4 }
predicate        = { type = "uint", size = 1, value = "EQ" }
