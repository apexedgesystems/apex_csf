# Executive (componentId=0, instanceIndex=0)
# Total: 114 bytes = 48 bytes (ExecutiveTunableParams) + 66 bytes (6 x ThreadConfigEntry)
#
# Optimized for Raspberry Pi 4 (4x Cortex-A72):
#   Core 0: CLOCK thread (FIFO 90) - dedicated tick generator
#   Core 1: TASK_EXECUTION thread (FIFO 80) - task dispatcher
#   Core 2: EXT_IO thread (OTHER) - serial/network I/O
#   Core 3: STARTUP, SHUTDOWN, WATCHDOG (OTHER) - housekeeping
#
# ExecutiveTunableParams (48 bytes):
#   uint16_t clockFrequencyHz = 100
#   uint16_t reserved0 = 0
#   uint8_t rtMode = 1 (HARD_PERIOD_COMPLETE)
#   uint8_t reserved1 = 0
#   uint16_t reserved2 = 0
#   uint32_t rtMaxLagTicks = 5
#   uint8_t startupMode = 0 (AUTO)
#   uint8_t reserved3 = 0
#   uint16_t reserved4 = 0
#   uint32_t startupDelaySeconds = 1
#   uint8_t shutdownMode = 2 (RELATIVE_TIME)
#   uint8_t skipCleanup = 0
#   uint16_t reserved5 = 0
#   uint32_t shutdownAfterSeconds = 10
#   uint32_t reserved6 = 0
#   uint64_t shutdownAtCycle = 0
#   uint32_t watchdogIntervalMs = 1000
#   uint32_t profilingSampleEveryN = 0
#
# ThreadConfigEntry (11 bytes each, 6 entries):
#   int8_t policy (0=OTHER, 1=FIFO, 2=RR)
#   int8_t priority (0-99)
#   uint8_t affinityCount
#   uint8_t affinity[8] (0xFF = unused)

