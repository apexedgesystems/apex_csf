# ATS 001: Communication Pass Plan
#
# Scheduled operations for a communication pass window. Steps fire at
# absolute cycle offsets from sequence start (100 Hz clock).
#
# Timeline:
#   T+0.0s (cycle 0):    Enable high-rate telemetry on SystemMonitor
#   T+5.0s (cycle 500):  NOOP connectivity check to Plant
#   T+10.0s (cycle 1000): NOOP connectivity check to Driver #0
#   T+20.0s (cycle 2000): NOOP connectivity check to Driver #1
#   T+50.0s (cycle 5000): Disable high-rate telemetry on SystemMonitor
#
# Note: ATS timing is currently cycle-based (delayCycles = absolute cycle
# offset from startCycle). Future: extensible to TAI/GPS/MET via time
# provider delegate on the executive.
#
# StandaloneSequenceTprm: 8-byte header + 16 steps x 84 bytes = 1352 bytes

[__enums__]
DATA_WRITE = 0
COMMAND = 1
ARM_CONTROL = 2
ABORT = 0
SKIP = 1
GOTO_STEP = 2
NEXT = 0
EQ = 4
RAW = 10
OUTPUT = 4

# ==============================================================================
# Header (8 bytes) - type=1 (ATS)
# ==============================================================================
[StandaloneSequenceTprm]
sequenceId   = { type = "uint", size = 2, value = 100 }
eventId      = { type = "uint", size = 2, value = 0 }
stepCount    = { type = "uint", size = 1, value = 5 }
repeatCount  = { type = "uint", size = 1, value = 0 }
type         = { type = "uint", size = 1, value = 1 }
armed        = { type = "uint", size = 1, value = 1 }

