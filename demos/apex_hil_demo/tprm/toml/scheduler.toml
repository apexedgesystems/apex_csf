# Scheduler (componentId=1, instanceIndex=0)
# Total: 213 bytes = 3 byte header + 14 x 15 byte task entries
#
# SchedulerTprmHeader (3 bytes):
#   uint8_t numPools = 1
#   uint8_t workersPerPool = 2
#   uint8_t numTasks = 14
#
# SchedulerTaskEntry (15 bytes, packed):
#   uint32_t fullUid
#   uint8_t taskUid
#   uint8_t poolIndex
#   uint16_t freqN
#   uint16_t freqD
#   uint16_t offset
#   int8_t priority
#   uint8_t seqGroup (0xFF = no sequencing)
#   uint8_t seqPhase

[SchedulerTprmHeader]
numPools = { type = "uint", size = 1, value = 1 }
workersPerPool = { type = "uint", size = 1, value = 2 }
numTasks = { type = "uint", size = 1, value = 14 }

# Component fullUids:
# HIL_PLANT_MODEL      = 0x7800 (30720)
# VIRTUAL_FLIGHT_CTRL  = 0x7900 (30976)
# HIL_DRIVER instance 0 = 0x7A00 (31232)
# HIL_DRIVER instance 1 = 0x7A01 (31233)
# HIL_COMPARATOR       = 0x7B00 (31488)
# SYSTEM_MONITOR       = 0xC800 (51200)
# TEST_PLUGIN          = 0xFA00 (64000)

