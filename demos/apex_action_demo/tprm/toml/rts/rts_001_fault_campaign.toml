# RTS 001: Fault Injection Campaign
#
# Exercises DataTransform fault injection on SensorModel output data.
# Configures entry 0 to target SensorModel (0xD200) OUTPUT category, then
# cycles through zero-mask, high-mask, and flip-mask faults with 5-cycle
# spacing. On completion, starts RTS 002 (cleanup) to clear all faults.
#
# Triggered by WP0: temperature > 50.
#
# StandaloneSequenceTprm: 8-byte header + 16 steps x 84 bytes = 1352 bytes
#
# Components:
#   0xCA00: DataTransform
#   0xD200: SensorModel
#   0x000500: Action (for START_RTS chain)

[__enums__]
# ActionType
COMMAND = 0
ARM_CONTROL = 1
# StepTimeoutPolicy
ABORT = 0
SKIP = 1
GOTO_STEP = 2
# StepCompletionAction
NEXT = 0
REPEAT = 1
START_RTS = 2
# WatchPredicate
EQ = 4
# WatchDataType
RAW = 10
# DataCategory
OUTPUT = 4

# ==============================================================================
# Header (8 bytes)
# ==============================================================================
[StandaloneSequenceTprm]
sequenceId   = { type = "uint", size = 2, value = 1 }
eventId      = { type = "uint", size = 2, value = 1 }
stepCount    = { type = "uint", size = 1, value = 10 }
repeatCount  = { type = "uint", size = 1, value = 0 }
type         = { type = "uint", size = 1, value = 0 }
