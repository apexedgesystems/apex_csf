# ==============================================================================
# CI -- lint, build, and test on PRs to main
#
# Change-scoped: a "changes" job classifies the PR diff, and the expensive jobs
# run only when their area changed. A tools/rust or tools/py change (e.g. a
# Dependabot bump) does not rebuild the C++/CUDA surface; a docs-only change
# runs lint alone. Anything under .github/, mk/, docker/, or the CMake build
# files is treated as cross-cutting and runs everything.
#
# Image strategy (see .github/actions/dev-setup): jobs pull the registry
# :latest dev image, which docker-images.yml keeps current with main. When the
# PR itself changes docker/, the affected image is rebuilt from the Dockerfiles
# instead so tests run against the PR's intended image.
#
# The build/test/smoke/docs chain runs in dev-cuda so the .cu surface is compile
# and link verified; docker-compose.ci.yml drops the GPU reservation so it
# starts on the GPU-less runner, and make testp excludes the cuda-labeled tests.
# ==============================================================================
name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

env:
  REGISTRY: ghcr.io/${{ github.repository }}

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      cpp: ${{ steps.f.outputs.cpp }}
      rust: ${{ steps.f.outputs.rust }}
      py: ${{ steps.f.outputs.py }}
      docker: ${{ steps.f.outputs.docker }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Classify changed files
        id: f
        run: |
          # workflow_dispatch (or any non-PR event) has no diff base: run all.
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            printf 'cpp=true\nrust=true\npy=true\ndocker=true\n' | tee -a "$GITHUB_OUTPUT"
            exit 0
          fi
          files=$(git diff --name-only "origin/${{ github.event.pull_request.base.ref }}...HEAD")
          printf 'changed files:\n%s\n' "$files"
          g() { printf '%s\n' "$files" | grep -qE "$1" && echo true || echo false; }
          docker=$(g '^(docker/|docker-compose)')
          # Cross-cutting areas force the full suite.
          if [ "$(g '^(\.github/|mk/|docker/|docker-compose)')" = true ]; then
            cpp=true; rust=true; py=true
          else
            cpp=$(g '^(src/|apps/|cmake/|CMakeLists\.txt|CMakePresets\.json)')
            rust=$(g '^tools/rust/')
            py=$(g '^tools/py/')
          fi
          printf 'cpp=%s\nrust=%s\npy=%s\ndocker=%s\n' "$cpp" "$rust" "$py" "$docker" | tee -a "$GITHUB_OUTPUT"

  lint:
    name: Lint and secret scan
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up dev image
        uses: ./.github/actions/dev-setup
        with:
          registry: ${{ env.REGISTRY }}
          actor: ${{ github.actor }}
          token: ${{ secrets.GITHUB_TOKEN }}
          service: dev
          rebuild: ${{ needs.changes.outputs.docker }}
      - name: Format check
        run: docker compose run --rm -T dev make format-check
      - name: Secret scan (gitleaks)
        run: docker compose run --rm -T dev make gitleaks

  build-test:
    name: Build and test (CUDA)
    needs: changes
    if: needs.changes.outputs.cpp == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      # Overlay docker-compose.ci.yml so dev-cuda starts without a GPU on the
      # runner (drops its device reservation); make testp excludes the
      # cuda-labeled tests.
      COMPOSE_FILE: docker-compose.yml:docker-compose.ci.yml
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up dev-cuda image
        uses: ./.github/actions/dev-setup
        with:
          registry: ${{ env.REGISTRY }}
          actor: ${{ github.actor }}
          token: ${{ secrets.GITHUB_TOKEN }}
          service: dev-cuda
          rebuild: ${{ needs.changes.outputs.docker }}
      - name: Build (debug, CUDA)
        run: docker compose run --rm -T dev-cuda make debug
      - name: Run C++ tests
        run: docker compose run --rm -T dev-cuda make testp
      - name: Demo smoke test (reuses debug build)
        run: docker compose run --rm -T dev-cuda make smoke APP=apex_mc_demo
      - name: Build documentation (zero-warning gate)
        run: docker compose run --rm -T dev-cuda make docs-check

  rust:
    name: Rust tool tests
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up dev image
        uses: ./.github/actions/dev-setup
        with:
          registry: ${{ env.REGISTRY }}
          actor: ${{ github.actor }}
          token: ${{ secrets.GITHUB_TOKEN }}
          service: dev
          rebuild: ${{ needs.changes.outputs.docker }}
      - name: Run Rust tests
        run: docker compose run --rm -T dev make test-rust

  py:
    name: Python tool tests
    needs: changes
    if: needs.changes.outputs.py == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up dev image
        uses: ./.github/actions/dev-setup
        with:
          registry: ${{ env.REGISTRY }}
          actor: ${{ github.actor }}
          token: ${{ secrets.GITHUB_TOKEN }}
          service: dev
          rebuild: ${{ needs.changes.outputs.docker }}
      - name: Run Python tests
        run: docker compose run --rm -T dev make test-py

  sanitize:
    name: Sanitize
    needs: changes
    if: needs.changes.outputs.cpp == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up dev image
        uses: ./.github/actions/dev-setup
        with:
          registry: ${{ env.REGISTRY }}
          actor: ${{ github.actor }}
          token: ${{ secrets.GITHUB_TOKEN }}
          service: dev
          rebuild: ${{ needs.changes.outputs.docker }}
      - name: Address + UB Sanitizer
        run: docker compose run --rm -T dev make asan-ubsan

  static-analysis:
    name: Static analysis
    needs: changes
    if: needs.changes.outputs.cpp == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up dev image
        uses: ./.github/actions/dev-setup
        with:
          registry: ${{ env.REGISTRY }}
          actor: ${{ github.actor }}
          token: ${{ secrets.GITHUB_TOKEN }}
          service: dev
          rebuild: ${{ needs.changes.outputs.docker }}
      - name: clang-tidy (gated checks)
        run: docker compose run --rm -T dev make static
