# ==============================================================================
# CI -- Build, test, and lint on push/PR to main
#
# Runs format-check, debug build, and test suite inside Docker Compose
# containers. Uses the CPU dev image. CUDA build paths are skipped when
# CUDAToolkit_FOUND is false at configure time.
#
# Image strategy:
#   - The registry copies of apex.base:latest and apex.dev.cpu:latest are
#     refreshed by docker-images.yml on every push to main that touches
#     docker/**, so they already match main's Dockerfiles.
#   - If this PR did not change docker/, the pulled :latest tags are
#     correct as-is and we skip docker compose build entirely.
#   - If this PR did change docker/, we fall back to docker compose build
#     so the test suite runs against the PR's intended images.
# ==============================================================================
name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  lint-build-test:
    name: Lint, Build, Test
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      REGISTRY: ghcr.io/${{ github.repository }}
      # Overlay docker-compose.ci.yml so dev-cuda starts without a GPU on the
      # runner (it drops dev-cuda's device reservation). Affects only dev-cuda;
      # the dev (CPU) steps are unchanged.
      COMPOSE_FILE: docker-compose.yml:docker-compose.ci.yml

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Prepare environment
        run: |
          touch ~/.gitconfig
          mkdir -p ~/.ssh
          echo "HOST_UID=$(id -u)" >> "$GITHUB_ENV"
          echo "HOST_GID=$(id -g)" >> "$GITHUB_ENV"

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull cached dev images
        run: |
          docker pull $REGISTRY/apex.base:latest     && docker tag $REGISTRY/apex.base:latest     apex.base     || true
          docker pull $REGISTRY/apex.dev.cpu:latest  && docker tag $REGISTRY/apex.dev.cpu:latest  apex.dev.cpu  || true
          docker pull $REGISTRY/apex.dev.cuda:latest && docker tag $REGISTRY/apex.dev.cuda:latest apex.dev.cuda || true

      - name: Detect docker/ changes
        id: docker
        run: |
          if git diff --name-only origin/${{ github.event.pull_request.base.ref }}...HEAD -- docker/ docker-compose.yml | grep -q .; then
            echo "Dockerfile or compose change detected -- will rebuild images"
            echo "rebuild=true" >> "$GITHUB_OUTPUT"
          else
            echo "No docker/ changes -- using registry :latest as-is"
            echo "rebuild=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build base, dev, and dev-cuda images
        if: steps.docker.outputs.rebuild == 'true'
        run: |
          docker compose build base
          docker compose build dev
          docker compose build dev-cuda

      - name: Format check
        run: docker compose run --rm -T dev make format-check

      - name: Secret scan (gitleaks)
        run: docker compose run --rm -T dev make gitleaks

      # The primary build runs in dev-cuda so the whole .cu surface is compile
      # and link verified on every PR (CUDA is core). The runner has no GPU, so
      # the docker-compose.ci.yml overlay drops dev-cuda's device reservation to
      # let the container start, and make testp's GPU probe excludes the
      # cuda-labeled tests (they run on a GPU host via make testp-cuda). debug,
      # testp, smoke, and docs-check share the dev-cuda build directory; gitleaks
      # and the tool tests stay on the CPU dev image.
      - name: Build (debug, CUDA)
        run: docker compose run --rm -T dev-cuda make debug

      - name: Run C++ tests
        run: docker compose run --rm -T dev-cuda make testp

      - name: Demo smoke test (reuses debug build)
        run: docker compose run --rm -T dev-cuda make smoke APP=apex_mc_demo

      - name: Build documentation (zero-warning gate)
        run: docker compose run --rm -T dev-cuda make docs-check

      - name: Run Rust tests
        run: docker compose run --rm -T dev make test-rust

      - name: Run Python tests
        run: docker compose run --rm -T dev make test-py

  sanitize:
    name: Sanitize
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      REGISTRY: ghcr.io/${{ github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Prepare environment
        run: |
          touch ~/.gitconfig
          mkdir -p ~/.ssh
          echo "HOST_UID=$(id -u)" >> "$GITHUB_ENV"
          echo "HOST_GID=$(id -g)" >> "$GITHUB_ENV"

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull cached dev images
        run: |
          docker pull $REGISTRY/apex.base:latest    && docker tag $REGISTRY/apex.base:latest    apex.base    || true
          docker pull $REGISTRY/apex.dev.cpu:latest && docker tag $REGISTRY/apex.dev.cpu:latest apex.dev.cpu || true

      - name: Detect docker/ changes
        id: docker
        run: |
          if git diff --name-only origin/${{ github.event.pull_request.base.ref }}...HEAD -- docker/ docker-compose.yml | grep -q .; then
            echo "Dockerfile or compose change detected -- will rebuild images"
            echo "rebuild=true" >> "$GITHUB_OUTPUT"
          else
            echo "No docker/ changes -- using registry :latest as-is"
            echo "rebuild=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build base and dev images
        if: steps.docker.outputs.rebuild == 'true'
        run: |
          docker compose build base
          docker compose build dev

      - name: Address + UB Sanitizer
        run: docker compose run --rm -T dev make asan-ubsan

  static-analysis:
    name: Static analysis
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      REGISTRY: ghcr.io/${{ github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Prepare environment
        run: |
          touch ~/.gitconfig
          mkdir -p ~/.ssh
          echo "HOST_UID=$(id -u)" >> "$GITHUB_ENV"
          echo "HOST_GID=$(id -g)" >> "$GITHUB_ENV"

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull cached dev images
        run: |
          docker pull $REGISTRY/apex.base:latest    && docker tag $REGISTRY/apex.base:latest    apex.base    || true
          docker pull $REGISTRY/apex.dev.cpu:latest && docker tag $REGISTRY/apex.dev.cpu:latest apex.dev.cpu || true

      - name: Detect docker/ changes
        id: docker
        run: |
          if git diff --name-only origin/${{ github.event.pull_request.base.ref }}...HEAD -- docker/ docker-compose.yml | grep -q .; then
            echo "Dockerfile or compose change detected -- will rebuild images"
            echo "rebuild=true" >> "$GITHUB_OUTPUT"
          else
            echo "No docker/ changes -- using registry :latest as-is"
            echo "rebuild=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build base and dev images
        if: steps.docker.outputs.rebuild == 'true'
        run: |
          docker compose build base
          docker compose build dev

      - name: clang-tidy (gated checks)
        run: docker compose run --rm -T dev make static
