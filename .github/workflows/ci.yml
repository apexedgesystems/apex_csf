# ==============================================================================
# CI -- lint, build, and test on PRs to main
#
# Change-scoped: a "changes" job classifies the PR diff, and the expensive jobs
# run only when their area changed. A tools/rust or tools/py change (e.g. a
# Dependabot bump) does not rebuild the C++/CUDA surface; a docs-only change
# runs lint alone. Scope-down is opt-in per known subtree: cross-cutting paths
# (.github/, mk/, docker/, the CMake build files) and any unrecognized path run
# the full suite, so a missed filter never silently drops coverage.
#
# Image strategy (see .github/actions/dev-setup): jobs pull the registry
# :latest dev image, which docker-images.yml keeps current with main. When the
# PR itself changes docker/, the affected image is rebuilt from the Dockerfiles
# instead so tests run against the PR's intended image.
#
# The build/test/smoke/docs chain runs in dev-cuda so the .cu surface is compile
# and link verified; docker-compose.ci.yml drops the GPU reservation so it
# starts on the GPU-less runner, and make testp excludes the cuda-labeled tests.
# ==============================================================================
name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

env:
  REGISTRY: ghcr.io/${{ github.repository }}

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      cpp: ${{ steps.f.outputs.cpp }}
      rust: ${{ steps.f.outputs.rust }}
      py: ${{ steps.f.outputs.py }}
      sh: ${{ steps.f.outputs.sh }}
      docker: ${{ steps.f.outputs.docker }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Classify changed files
        id: f
        run: |
          # Diff against the PR base, or origin/main for a manual dispatch, so a
          # dispatch scopes (and rebuilds images) exactly as the PR would --
          # never a blanket image rebuild just because there is no PR context.
          base="${{ github.event.pull_request.base.ref || 'main' }}"
          # --no-renames: a rename lists both sides, so a file moving OUT of a
          # scoped area still classifies as a change to that area; default
          # rename detection would emit only the destination path.
          files=$(git diff --name-only --no-renames "origin/$base...HEAD")
          printf 'changed files:\n%s\n' "$files"
          # Scope DOWN only for changes confined to known-isolated areas; any
          # unrecognized path (root configs, new top-level dirs, build/CI infra)
          # falls through to the full suite, so coverage is never silently lost.
          cpp=false; rust=false; py=false; sh=false; allflag=false
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            case "$file" in
              tools/rust/*) rust=true ;;
              tools/py/*)   py=true ;;
              tools/sh/*)   sh=true ;;
              src/*|demos/*|apps/*|cmake/*|CMakeLists.txt|CMakePresets.json) cpp=true ;;
              *.md|docs/*)  : ;;
              # Dev-image inputs the gate jobs actually run in (base; the cpu dev
              # image used by lint/static; the cuda image used by build-test) plus
              # the base compose -- a change here can alter every build.
              docker/base.Dockerfile|docker/dev/cpu.Dockerfile|docker/dev/cuda.Dockerfile|docker-compose.yml) allflag=true ;;
              # Leaf cross/firmware images and the scripts they COPY are built and
              # verified post-merge (docker-images.yml) + locally, and no gate job
              # runs in them, so a change confined here needs only lint -- not the
              # full C++/rust/py suite. (Lint always runs; it hadolints/shellchecks
              # these.)
              docker/dev/*|docker/scripts/*) : ;;
              .github/*|mk/*|docker/*|docker-compose*) allflag=true ;;
              *)            allflag=true ;;
            esac
          done <<< "$files"
          # An empty diff (e.g. a dispatch on main itself) classifies nothing
          # and would yield a green lint-only run; treat it as cross-cutting so
          # a manual run is always a full run. docker stays diff-driven -- an
          # empty diff never forces an image rebuild.
          if [ -z "$files" ]; then allflag=true; fi
          if [ "$allflag" = true ]; then cpp=true; rust=true; py=true; sh=true; fi
          # Rebuild only when a gate-image INPUT changes: the images a gate job
          # runs in (base tiers, the cpu dev image, the cuda image, the base
          # compose), or anything base.Dockerfile bakes -- the dependency
          # manifests (tools/rust/Cargo.*, tools/py/uv.lock|pyproject.toml,
          # ExternalDependencies.cmake) and the baked scripts (docker/scripts/).
          # Without the baked inputs the gate runs offline builds against STALE
          # caches: a lock bump fails on missing crates/wheels, and a GIT_TAG
          # bump silently builds the OLD baked source via the
          # FETCHCONTENT_SOURCE_DIR redirect (green-but-wrong). Leaf
          # cross/firmware Dockerfiles feed only post-merge images; builder/final
          # feed the release pipe; CI compose overlays are runtime-only.
          docker=$(printf '%s\n' "$files" | grep -qE '^docker/base\.Dockerfile$|^docker/dev/cpu\.Dockerfile$|^docker/dev/cuda\.Dockerfile$|^docker-compose\.yml$|^docker/scripts/|^tools/rust/Cargo\.(lock|toml)$|^tools/py/(uv\.lock|pyproject\.toml)$|^ExternalDependencies\.cmake$' && echo true || echo false)
          printf 'cpp=%s\nrust=%s\npy=%s\nsh=%s\ndocker=%s\n' "$cpp" "$rust" "$py" "$sh" "$docker" | tee -a "$GITHUB_OUTPUT"

  lint:
    name: Lint and secret scan
    needs: changes
    runs-on: ubuntu-latest
    # Rebuild-path headroom: when the PR changes image inputs, dev-setup
    # rebuilds dev-base here, and a low-cache-overlap rebuild runs ~19 min
    # before the checks even start (a 20-minute cap made it a runner-speed
    # coin flip). Pull-path runs still finish in minutes.
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      # Host-side static check, no image needed -- run it before the image
      # pull so release-path drift is the fastest failure in the pipeline.
      - name: Check release paths (final.Dockerfile vs presets)
        run: make check-release-paths
      - name: Check platform consumers match the registry
        run: make check-platforms
      - name: Set up dev image
        uses: ./.github/actions/dev-setup
        with:
          registry: ${{ env.REGISTRY }}
          actor: ${{ github.actor }}
          token: ${{ secrets.GITHUB_TOKEN }}
          service: dev
          rebuild: ${{ needs.changes.outputs.docker }}
      - name: Format check
        run: docker compose run --rm -T dev make format-check
      - name: Secret scan (gitleaks)
        run: docker compose run --rm -T dev make gitleaks

  build-test:
    name: Build and test (CUDA)
    needs: changes
    if: needs.changes.outputs.cpp == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      # Overlay docker-compose.ci.yml for the host ccache bind. cuda-build has
      # no GPU reservation; make testp excludes the cuda-labeled tests on the
      # GPU-less runner.
      COMPOSE_FILE: docker-compose.yml:docker-compose.ci.yml
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      # This job builds the full debug tree in the CUDA image and needs disk
      # headroom; the host SDKs are unused inside the container, so reclaim first.
      - name: Reclaim disk
        uses: ./.github/actions/reclaim-disk
      - name: Set up cuda-build image
        uses: ./.github/actions/dev-setup
        with:
          registry: ${{ env.REGISTRY }}
          actor: ${{ github.actor }}
          token: ${{ secrets.GITHUB_TOKEN }}
          service: cuda-build
          rebuild: ${{ needs.changes.outputs.docker }}
      # Second restore key: the nightly debug leg saves main-scoped entries,
      # the only ones a brand-new PR's first push can see (ccache is
      # content-addressed, so a partial-match cache only helps, never hurts).
      - name: Restore ccache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: .ccache
          key: ccache-build-test-${{ github.sha }}
          restore-keys: |
            ccache-build-test-
            ccache-nightly-debug-
      - name: Prepare ccache dir
        run: mkdir -p .ccache
      - name: Build (debug, CUDA)
        run: docker compose run --rm -T cuda-build make debug
      - name: Run C++ tests
        run: docker compose run --rm -T cuda-build make testp
      - name: Demo smoke test (reuses debug build)
        run: docker compose run --rm -T cuda-build make smoke APP=apex_mc_demo
      # Hit rate of the persisted cache, in the job log where a regression
      # (key drift, broken bind) is visible -- a broken cache layer once ran
      # silent for five release runs.
      - name: ccache stats
        run: docker compose run --rm -T cuda-build ccache -s | tail -n 8

  rust:
    name: Rust tool tests
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - name: Set up build-base image
        uses: ./.github/actions/dev-setup
        with:
          registry: ${{ env.REGISTRY }}
          actor: ${{ github.actor }}
          token: ${{ secrets.GITHUB_TOKEN }}
          service: build-base
          rebuild: ${{ needs.changes.outputs.docker }}
      - name: Run Rust tests
        run: docker compose run --rm -T build-base make test-rust
      # Deny-all-warnings: the rust counterpart of clang-tidy's
      # warnings-as-errors. Deterministic -- clippy's version is pinned by the
      # image, so a finding here is a code change, never rule drift.
      - name: Rust static analysis (clippy)
        run: docker compose run --rm -T build-base make clippy

  py:
    name: Python tool tests
    needs: changes
    if: needs.changes.outputs.py == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - name: Set up build-base image
        uses: ./.github/actions/dev-setup
        with:
          registry: ${{ env.REGISTRY }}
          actor: ${{ github.actor }}
          token: ${{ secrets.GITHUB_TOKEN }}
          service: build-base
          rebuild: ${{ needs.changes.outputs.docker }}
      - name: Run Python tests
        run: docker compose run --rm -T build-base make test-py

  # Host-side: the smoke needs only bash and tar, and runs in seconds.
  sh:
    name: Shell tool smoke
    needs: changes
    if: needs.changes.outputs.sh == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Run shell tools smoke
        run: make test-sh

  sanitize:
    name: Sanitize
    needs: changes
    if: needs.changes.outputs.cpp == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      COMPOSE_FILE: docker-compose.yml:docker-compose.ci.yml
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - name: Set up build-base image
        uses: ./.github/actions/dev-setup
        with:
          registry: ${{ env.REGISTRY }}
          actor: ${{ github.actor }}
          token: ${{ secrets.GITHUB_TOKEN }}
          service: build-base
          rebuild: ${{ needs.changes.outputs.docker }}
      - name: Restore ccache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: .ccache
          key: ccache-sanitize-${{ github.sha }}
          restore-keys: |
            ccache-sanitize-
            ccache-nightly-asan-ubsan-
      - name: Prepare ccache dir
        run: mkdir -p .ccache
      - name: Address + UB Sanitizer
        run: docker compose run --rm -T build-base make asan-ubsan
      - name: ccache stats
        run: docker compose run --rm -T build-base ccache -s | tail -n 8

  static-analysis:
    name: Static analysis
    needs: changes
    if: needs.changes.outputs.cpp == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      # The ci overlay drops dev-cuda's GPU device reservation -- the runner
      # has no GPU, and clang-tidy only parses the CUDA headers.
      COMPOSE_FILE: docker-compose.yml:docker-compose.ci.yml
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      # dev-cuda, not dev: the CUDA toolkit must be present so the CUDA-gated
      # translation units enter the compile database -- clang-tidy only parses
      # headers, no GPU needed. With the dev image, those TUs were invisible to
      # the gate and gated findings accumulated unseen.
      - name: Set up dev image
        uses: ./.github/actions/dev-setup
        with:
          registry: ${{ env.REGISTRY }}
          actor: ${{ github.actor }}
          token: ${{ secrets.GITHUB_TOKEN }}
          service: dev-cuda
          rebuild: ${{ needs.changes.outputs.docker }}
      # No ccache here: clang-tidy does not compile through the launcher --
      # every cache this job ever saved was ~191 bytes (see CHECKS_CCACHE in
      # mk/checks.mk for the same rule on nightly legs).
      - name: clang-tidy (gated checks)
        run: docker compose run --rm -T dev-cuda make static
      # Doxygen ships in dev-base, which dev-cuda extends, so the docs
      # zero-warning gate stays in this job.
      - name: Build documentation (zero-warning gate)
        run: docker compose run --rm -T dev-cuda make docs-check

  # ----------------------------------------------------------------------------
  # Run report -- advisory timing/scope emit. Surfaces what the run did (scoped
  # vs full suite, image rebuild vs pull) and what each job cost, as notices +
  # the step summary, so a run explains itself without log archaeology.
  # Emit-only: never gates (always() + no failure paths).
  # ----------------------------------------------------------------------------
  report:
    name: Run report
    needs: [changes, lint, build-test, rust, py, sanitize, static-analysis]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: read
    steps:
      - name: Emit timing and scope
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CPP: ${{ needs.changes.outputs.cpp }}
          RUST: ${{ needs.changes.outputs.rust }}
          PY: ${{ needs.changes.outputs.py }}
          DOCKER: ${{ needs.changes.outputs.docker }}
        run: |
          scope="scoped"
          [ "$CPP$RUST$PY" = "truetruetrue" ] && scope="full"
          images="pulled"
          [ "$DOCKER" = "true" ] && images="rebuilt (image inputs changed)"
          echo "::notice title=CI scope::suite=$scope (cpp=$CPP rust=$RUST py=$PY); gate images $images"
          {
            echo "## CI run report"
            echo ""
            echo "- **Suite**: $scope (cpp=$CPP, rust=$RUST, py=$PY)"
            echo "- **Gate images**: $images"
            echo ""
            echo "| Job | Result | Duration |"
            echo "|---|---|---|"
          } >> "$GITHUB_STEP_SUMMARY"
          gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/jobs?per_page=100" \
            --jq '.jobs[] | select(.name != "Run report") | [.name, (.conclusion // .status), .started_at, (.completed_at // "")] | @tsv' |
          while IFS=$'\t' read -r name concl start end; do
            secs=0
            if [ -n "$start" ] && [ -n "$end" ]; then
              secs=$(( $(date -d "$end" +%s) - $(date -d "$start" +%s) ))
            fi
            printf '| %s | %s | %dm%02ds |\n' "$name" "$concl" $((secs/60)) $((secs%60)) >> "$GITHUB_STEP_SUMMARY"
            echo "::notice title=CI timing::${name}: ${concl} in $((secs/60))m$((secs%60))s"
          done
