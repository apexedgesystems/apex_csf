# ==============================================================================
# CI -- Build, test, and lint on push/PR to main
#
# Runs format-check, debug build, and test suite inside Docker Compose
# containers. Uses the CPU dev image. CUDA build paths are skipped when
# CUDAToolkit_FOUND is false at configure time.
#
# Image build strategy:
#   - apex.base and apex.dev.cpu are built via docker/build-push-action with a
#     registry-stored BuildKit cache (the `:buildcache` tag on each image).
#     Subsequent runs reuse layers from that cache, so unchanged Dockerfiles
#     finish the image build in seconds instead of ~17 minutes per job.
#   - The images are loaded into the runner's local docker daemon (load: true),
#     so subsequent `docker compose run` calls find them by name.
# ==============================================================================
name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  lint-build-test:
    name: Lint, Build, Test
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      REGISTRY: ghcr.io/${{ github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare environment
        run: |
          touch ~/.gitconfig
          mkdir -p ~/.ssh
          echo "USER=$USER" >> "$GITHUB_ENV"
          echo "HOST_UID=$(id -u)" >> "$GITHUB_ENV"
          echo "HOST_GID=$(id -g)" >> "$GITHUB_ENV"

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build apex.base (with registry cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/base.Dockerfile
          tags: apex.base:latest
          load: true
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/apex.base:buildcache
            type=registry,ref=${{ env.REGISTRY }}/apex.base:latest
          cache-to: type=registry,ref=${{ env.REGISTRY }}/apex.base:buildcache,mode=max
          build-args: |
            USER=${{ env.USER }}
            HOST_UID=${{ env.HOST_UID }}
            HOST_GID=${{ env.HOST_GID }}

      - name: Build apex.dev.cpu (with registry cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/dev/cpu.Dockerfile
          tags: apex.dev.cpu:latest
          load: true
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/apex.dev.cpu:buildcache
            type=registry,ref=${{ env.REGISTRY }}/apex.dev.cpu:latest
          cache-to: type=registry,ref=${{ env.REGISTRY }}/apex.dev.cpu:buildcache,mode=max
          build-args: |
            USER=${{ env.USER }}
            HOST_UID=${{ env.HOST_UID }}
            HOST_GID=${{ env.HOST_GID }}

      - name: Format check
        run: docker compose run --rm -T dev make format-check

      - name: Build (debug)
        run: docker compose run --rm -T dev make debug

      - name: Run C++ tests
        run: docker compose run --rm -T dev make testp

      - name: Run Rust tests
        run: docker compose run --rm -T dev make test-rust

      - name: Run Python tests
        run: docker compose run --rm -T dev make test-py

  sanitize-and-docs:
    name: Sanitize, Docs
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      REGISTRY: ghcr.io/${{ github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare environment
        run: |
          touch ~/.gitconfig
          mkdir -p ~/.ssh
          echo "USER=$USER" >> "$GITHUB_ENV"
          echo "HOST_UID=$(id -u)" >> "$GITHUB_ENV"
          echo "HOST_GID=$(id -g)" >> "$GITHUB_ENV"

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build apex.base (with registry cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/base.Dockerfile
          tags: apex.base:latest
          load: true
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/apex.base:buildcache
            type=registry,ref=${{ env.REGISTRY }}/apex.base:latest
          cache-to: type=registry,ref=${{ env.REGISTRY }}/apex.base:buildcache,mode=max
          build-args: |
            USER=${{ env.USER }}
            HOST_UID=${{ env.HOST_UID }}
            HOST_GID=${{ env.HOST_GID }}

      - name: Build apex.dev.cpu (with registry cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/dev/cpu.Dockerfile
          tags: apex.dev.cpu:latest
          load: true
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/apex.dev.cpu:buildcache
            type=registry,ref=${{ env.REGISTRY }}/apex.dev.cpu:latest
          cache-to: type=registry,ref=${{ env.REGISTRY }}/apex.dev.cpu:buildcache,mode=max
          build-args: |
            USER=${{ env.USER }}
            HOST_UID=${{ env.HOST_UID }}
            HOST_GID=${{ env.HOST_GID }}

      - name: AddressSanitizer
        run: docker compose run --rm -T dev make asan

      - name: Build documentation
        run: docker compose run --rm -T dev make docs
