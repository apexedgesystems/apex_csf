# ==============================================================================
# CI -- Build, test, and lint on push/PR to main
#
# Runs format-check, debug build, and test suite inside Docker Compose
# containers. Uses the CPU dev image (no NVIDIA driver required).
# CUDA GPU code is auto-skipped: find_package(CUDAToolkit QUIET) returns
# NOT_FOUND in the CPU image, so gpu_compute subdirectories are excluded.
# ==============================================================================
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  lint-build-test:
    name: Lint, Build, Test
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      REGISTRY: ghcr.io/${{ github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare environment
        run: |
          touch ~/.gitconfig
          mkdir -p ~/.ssh
          echo "HOST_UID=$(id -u)" >> "$GITHUB_ENV"
          echo "HOST_GID=$(id -g)" >> "$GITHUB_ENV"

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull cached dev images
        run: |
          docker pull $REGISTRY/apex.base:latest    && docker tag $REGISTRY/apex.base:latest    apex.base    || true
          docker pull $REGISTRY/apex.dev.cpu:latest && docker tag $REGISTRY/apex.dev.cpu:latest apex.dev.cpu || true

      - name: Build base and dev images
        run: |
          docker compose build base
          docker compose build dev

      - name: Format check
        run: docker compose run --rm -T dev make format-check

      - name: Build (debug)
        run: docker compose run --rm -T dev make debug

      - name: Run C++ tests
        run: docker compose run --rm -T dev make testp

      - name: Run Rust tests
        run: docker compose run --rm -T dev make test-rust

      - name: Run Python tests
        run: docker compose run --rm -T dev make test-py
