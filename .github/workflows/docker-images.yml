# ==============================================================================
# Docker Images -- Build and push dev images to ghcr.io (data-driven DAG)
#
# The whole image graph is one data table in the detect job (GRAPH below): each
# row is image | compose-service | parent-image | tier | dockerfile. detect
# diffs docker/, marks an image for rebuild if its own Dockerfile changed or any
# ancestor rebuilds, and emits one matrix per topological tier containing only
# the changed images. The build runs as N generic tier jobs (tier0 -> tier1 ->
# tier2), each a matrix that calls the shared docker-build-push composite.
#
# Adding a target = add ONE row to GRAPH (and a compose service). No new job.
# A deeper graph (a new tier) = copy a tier job. Build order is guaranteed by
# `needs` between tiers; selectivity by the per-image rebuild flags -- the two
# stay decoupled, which a single buildx-bake job cannot do without forcing
# parent rebuilds.
#
# Selectivity (unchanged from the original sequential workflow):
#   base.Dockerfile      -> everything (base is the root)
#   dev/cpu.Dockerfile   -> cpu + all cpu-children
#   dev/cuda.Dockerfile  -> cuda + jetson
#   dev/<leaf>.Dockerfile-> only that leaf
#   unrelated docker/ change -> nothing
#
# Each non-root build pulls its parent image first (a fresh runner has no local
# parent to build FROM) and builds through the CI cache overlay
# (docker-compose.ci-cache.yml). Images are pushed :latest and :{sha}.
# ==============================================================================
name: Docker Images

on:
  push:
    branches: [main]
    paths:
      - docker/**
      - docker-compose.yml
      # base.Dockerfile bakes the rust cargo cache + the FetchContent sources from
      # these, so a bump must rebuild the image to refresh them (offline/hermetic
      # builds depend on the baked copies).
      - tools/rust/Cargo.lock
      - tools/rust/Cargo.toml
      - ExternalDependencies.cmake
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: "Rebuild all images regardless of Dockerfile changes"
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io/${{ github.repository }}

jobs:
  # ----------------------------------------------------------------------------
  # Resolve the image graph and emit one matrix per tier of changed images.
  # ----------------------------------------------------------------------------
  detect:
    name: Detect changed images
    runs-on: ubuntu-latest
    outputs:
      tier0: ${{ steps.d.outputs.tier0 }}
      tier1: ${{ steps.d.outputs.tier1 }}
      tier2: ${{ steps.d.outputs.tier2 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve rebuild graph
        id: d
        env:
          FORCE: ${{ github.event.inputs.force_rebuild }}
          BEFORE: ${{ github.event.before }}
        run: |
          set -euo pipefail

          # image | compose-service | parent-image | tier | dockerfile
          # apex.base and apex.build-base are two targets of base.Dockerfile, so
          # a base.Dockerfile change rebuilds both (and cascades to their
          # children). apex.cuda-build is the lean CUDA tier on build-base,
          # sharing cuda.Dockerfile with apex.dev.cuda.
          GRAPH="
          apex.base|base||0|docker/base.Dockerfile
          apex.build-base|build-base||0|docker/base.Dockerfile
          apex.dev.cpu|dev|apex.base|1|docker/dev/cpu.Dockerfile
          apex.dev.cuda|dev-cuda|apex.base|1|docker/dev/cuda.Dockerfile
          apex.cuda-build|cuda-build|apex.build-base|1|docker/dev/cuda.Dockerfile
          apex.dev.jetson|dev-jetson|apex.dev.cuda|2|docker/dev/jetson.Dockerfile
          apex.build.jetson|build-jetson|apex.cuda-build|2|docker/dev/jetson.Dockerfile
          apex.dev.rpi|dev-rpi|apex.dev.cpu|2|docker/dev/rpi.Dockerfile
          apex.dev.riscv64|dev-riscv64|apex.dev.cpu|2|docker/dev/riscv64.Dockerfile
          apex.dev.stm32|dev-stm32|apex.dev.cpu|2|docker/dev/stm32.Dockerfile
          apex.dev.esp32|dev-esp32|apex.dev.cpu|2|docker/dev/esp32.Dockerfile
          apex.dev.pico|dev-pico|apex.dev.cpu|2|docker/dev/pico.Dockerfile
          apex.dev.arduino|dev-arduino|apex.dev.cpu|2|docker/dev/arduino.Dockerfile
          apex.dev.c2000|dev-c2000|apex.dev.cpu|2|docker/dev/c2000.Dockerfile
          "
          # zephyr, atmega328pb, and pic32 are intentionally absent: they are
          # dev-shell-only platforms -- no shipping artifact uses them and their
          # toolchains are unmaintained against the current base -- so CI does
          # not build or publish them. Build one locally with
          # make docker-dev-<name> if a developer needs the shell.
          MAX_TIER=2

          # Diff the whole pushed range (a rebase-merge lands several commits;
          # HEAD~1 would see only the last). event.before is zeros on the
          # first push / force-push edge cases -- fall back to HEAD~1, and to
          # rebuild-everything if no range resolves.
          if [ -n "${BEFORE:-}" ] && [ "${BEFORE}" != "0000000000000000000000000000000000000000" ] \
             && git rev-parse -q --verify "${BEFORE}^{commit}" >/dev/null; then
            RANGE="${BEFORE}..HEAD"
          else
            RANGE="HEAD~1..HEAD"
          fi
          DIFF=$(git diff --name-only "$RANGE" -- docker/ docker-compose.yml tools/rust/Cargo.lock tools/rust/Cargo.toml ExternalDependencies.cmake 2>/dev/null || echo "docker/base.Dockerfile")

          # A change to a shared script under docker/scripts/ must rebuild every
          # image whose Dockerfile COPYs it. The COPY line is the source of truth
          # for that dependency, so fold each changed script's consuming
          # Dockerfiles into DIFF -- the per-image match below then selects them
          # (with the usual parent cascade), no separate script-to-image table.
          for script in $(printf '%s\n' "$DIFF" | grep '^docker/scripts/' || true); do
            consumers=$(grep -rlF "$script" docker --include='*.Dockerfile' 2>/dev/null || true)
            [ -n "$consumers" ] && DIFF=$(printf '%s\n%s' "$DIFF" "$consumers")
          done

          # base.Dockerfile bakes the rust cargo cache (tools/rust/Cargo.*) and the
          # FetchContent sources (ExternalDependencies.cmake), so a change to either
          # must rebuild base/build-base to refresh them -- otherwise an offline
          # build would run against a stale cache. Map those onto base.Dockerfile
          # (which cascades to every child).
          if printf '%s\n' "$DIFF" | grep -qE '^tools/rust/Cargo\.|^ExternalDependencies\.cmake'; then
            DIFF=$(printf '%s\n%s' "$DIFF" "docker/base.Dockerfile")
          fi

          echo "Changed docker files (${RANGE}):"; echo "$DIFF"

          # The base compose carries the build args/contexts every image build
          # consumes (x-build-args) -- a change there invalidates the whole
          # graph, same as force_rebuild.
          if printf '%s\n' "$DIFF" | grep -qx "docker-compose.yml"; then
            FORCE=true
          fi

          rows=$(echo "$GRAPH" | sed 's/^[[:space:]]*//' | grep -v '^$')
          declare -A RB

          # Decide rebuild tier-by-tier so each parent is resolved before its child.
          for tier in $(seq 0 "$MAX_TIER"); do
            while IFS='|' read -r image svc parent t df; do
              [ "$t" = "$tier" ] || continue
              r=false
              if [ "${FORCE:-false}" = true ] \
                 || printf '%s\n' "$DIFF" | grep -qF "$df" \
                 || { [ -n "$parent" ] && [ "${RB[$parent]:-false}" = true ]; }; then
                r=true
              fi
              RB[$image]=$r
            done <<< "$rows"
          done

          # Emit one JSON matrix array per tier of the images that will rebuild.
          for tier in $(seq 0 "$MAX_TIER"); do
            items=()
            while IFS='|' read -r image svc parent t df; do
              [ "$t" = "$tier" ] || continue
              if [ "${RB[$image]}" = true ]; then
                items+=("{\"service\":\"${svc}\",\"image\":\"${image}\",\"parent\":\"${parent}\"}")
              fi
            done <<< "$rows"
            json="[$(IFS=,; echo "${items[*]:-}")]"
            echo "tier${tier}=${json}" >> "$GITHUB_OUTPUT"
            echo "tier${tier}: ${json}"
          done

  # ----------------------------------------------------------------------------
  # One generic job per tier; each builds its changed images concurrently.
  # tierN needs tier(N-1) so parents are pushed before children pull them.
  # ----------------------------------------------------------------------------
  tier0:
    name: ${{ matrix.img.image }}
    needs: detect
    if: ${{ needs.detect.outputs.tier0 != '[]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        img: ${{ fromJSON(needs.detect.outputs.tier0) }}
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/docker-build-push
        with:
          service: ${{ matrix.img.service }}
          image: ${{ matrix.img.image }}
          parent: ${{ matrix.img.parent }}
          registry: ${{ env.REGISTRY }}
          sha: ${{ github.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}

  tier1:
    name: ${{ matrix.img.image }}
    needs: [detect, tier0]
    if: ${{ always() && needs.detect.outputs.tier1 != '[]' && needs.tier0.result != 'failure' && needs.tier0.result != 'cancelled' }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        img: ${{ fromJSON(needs.detect.outputs.tier1) }}
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/docker-build-push
        with:
          service: ${{ matrix.img.service }}
          image: ${{ matrix.img.image }}
          parent: ${{ matrix.img.parent }}
          registry: ${{ env.REGISTRY }}
          sha: ${{ github.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}

  tier2:
    name: ${{ matrix.img.image }}
    needs: [detect, tier1]
    if: ${{ always() && needs.detect.outputs.tier2 != '[]' && needs.tier1.result != 'failure' && needs.tier1.result != 'cancelled' }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        img: ${{ fromJSON(needs.detect.outputs.tier2) }}
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/docker-build-push
        with:
          service: ${{ matrix.img.service }}
          image: ${{ matrix.img.image }}
          parent: ${{ matrix.img.parent }}
          registry: ${{ env.REGISTRY }}
          sha: ${{ github.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}
