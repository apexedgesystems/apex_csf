# ==============================================================================
# Release -- Build artifacts and publish to GitHub Releases (parallel builders)
#
# Three jobs; the dispatch rehearsal and a tag release run the SAME steps, so a
# green rehearsal is proof the next tag will publish:
#
#   builders (matrix, one runner each) -- compile apex for each target into
#     apex.builder.<t> and push it to ghcr tagged with the commit sha, so the
#     fan-in assembles exactly this run's images; a concurrent run can never
#     swap binaries underneath us.
#   apps (parallel with the builders)  -- build the app release packages in the
#     platform dev images (they compile from source and consume no builder
#     image) and upload the tarballs as a workflow artifact.
#   package (fan-in)                   -- pull this run's builder images,
#     assemble the final image (COPY --from each builder), extract the platform
#     artifacts, and -- only on a tag push -- publish the GitHub Release with
#     the app tarballs attached.
#
# Triggers:
#   tag v*            -- full release: everything below, then publish.
#   workflow_dispatch -- everything EXCEPT publish. The publish step is gated
#                        on the push event, not the ref, so dispatching on a
#                        tag ref is still only a rehearsal. VERSION falls back
#                        to 0.0.0-ci.
#
# Runs are serialized by a non-cancelling concurrency group: overlapping runs
# would race on the shared ccache keys, and releases should land one at a time.
#
# A ccache miss only means a cold compile -- ccache is content-addressed, so a
# stale or empty cache can never produce a wrong build.
# ==============================================================================
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release

env:
  REGISTRY: ghcr.io/${{ github.repository }}

jobs:
  # ----------------------------------------------------------------------------
  # Resolve the builder matrix from mk/docker.mk BUILDER_TARGETS -- the single
  # source of truth for the release target set (nightly.yml pattern).
  # ----------------------------------------------------------------------------
  targets:
    name: Resolve builder targets
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      list: ${{ steps.list.outputs.list }}
      apps: ${{ steps.list.outputs.apps }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Read builder targets and released apps from the registries
        id: list
        run: |
          echo "list=$(make -s print-builder-targets)" >> "$GITHUB_OUTPUT"
          echo "apps=$(make -s print-release-apps)" >> "$GITHUB_OUTPUT"

  # ----------------------------------------------------------------------------
  # Compile each target's builder image in parallel; push to ghcr for the
  # package job to assemble from. Per-target ccache via buildkit-cache-dance.
  # ----------------------------------------------------------------------------
  builders:
    name: builder-${{ matrix.builder }}
    needs: targets
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        builder: ${{ fromJSON(needs.targets.outputs.list) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # No purge here: these jobs measured green at the stock ~89 GB-free
      # baseline (run 27388041846); only the package fan-in needs more. The
      # report keeps a capacity squeeze diagnosable from the run that hit it.
      - name: Report disk space
        run: df -h /

      - name: Prepare environment
        run: |
          touch ~/.gitconfig
          mkdir -p ~/.ssh
          echo "HOST_UID=$(id -u)" >> "$GITHUB_ENV"
          echo "HOST_GID=$(id -g)" >> "$GITHUB_ENV"

      - name: Login to ghcr.io
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # The dev image is the builder's FROM and the only image input
      # (docker/builder.Dockerfile); a failed pull must fail here, not as a
      # confusing BuildKit error two steps later.
      - name: Pull builder's dev image (the FROM)
        env:
          DEV: apex.dev.${{ matrix.builder }}
        run: |
          docker pull "$REGISTRY/$DEV:latest"
          docker tag "$REGISTRY/$DEV:latest" "$DEV"

      - name: Restore builder ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-builder-${{ matrix.builder }}-${{ github.sha }}
          restore-keys: |
            ccache-builder-${{ matrix.builder }}-
      - name: Prepare ccache dir
        run: mkdir -p .ccache
      # The injected mount must carry the SAME uid/gid options as
      # builder.Dockerfile's cache mount: BuildKit forks cache identity on
      # differing mount options, so a plain map injects into (and extracts
      # from) a cache the build never sees. continue-on-error stays: extraction
      # runs as a post step, and a cache hiccup after a successful build must
      # not fail the release; the in-build ccache -s line is the hit-rate
      # signal.
      - name: Compose ccache cache map (mount identity must match)
        id: ccache-map
        run: |
          printf 'map={ ".ccache": { "target": "/ccache", "uid": "%s", "gid": "%s" } }\n' \
            "$(id -u)" "$(id -g)" >> "$GITHUB_OUTPUT"
      - name: Inject ccache into the build mount
        uses: reproducible-containers/buildkit-cache-dance@5422eac04292c961a382e0f584ea0f03ad9da723 # v3
        continue-on-error: true
        with:
          cache-map: ${{ steps.ccache-map.outputs.map }}

      - name: Build builder image
        run: make docker-builder-${{ matrix.builder }}

      - name: Push builder image (immutable per-run tag)
        env:
          IMG: apex.builder.${{ matrix.builder }}
        run: |
          docker tag "$IMG" "$REGISTRY/$IMG:$GITHUB_SHA"
          docker push "$REGISTRY/$IMG:$GITHUB_SHA"

  # ----------------------------------------------------------------------------
  # Build each released app's packages in parallel with the builders and with
  # each other: make release APP=<a> compiles from source inside the platform
  # dev images and consumes no builder output, so wall-clock is the slowest
  # app, not the sum (serial app packaging sank v0.0.1-rc1 and -rc2 ~40
  # minutes in). Matrix and per-app image lists come from mk/release.mk
  # RELEASE_APPS via print-release-apps.
  # ----------------------------------------------------------------------------
  apps:
    name: apps-${{ matrix.app }}
    needs: targets
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.targets.outputs.apps) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # No purge here: these jobs measured green at the stock ~89 GB-free
      # baseline (run 27388041846); only the package fan-in needs more. The
      # report keeps a capacity squeeze diagnosable from the run that hit it.
      - name: Report disk space
        run: df -h /

      - name: Prepare environment
        run: |
          touch ~/.gitconfig
          mkdir -p ~/.ssh
          echo "HOST_UID=$(id -u)" >> "$GITHUB_ENV"
          echo "HOST_GID=$(id -g)" >> "$GITHUB_ENV"

      - name: Login to ghcr.io
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull this app's platform dev images
        env:
          IMAGES: ${{ matrix.images }}
        run: |
          for img in $IMAGES; do
            docker pull "$REGISTRY/$img:latest"
            docker tag "$REGISTRY/$img:latest" "$img"
          done

      - name: Build app release package
        env:
          APP: ${{ matrix.app }}
        run: make release APP="$APP"

      - name: Upload app package
        uses: actions/upload-artifact@v7
        with:
          name: app-package-${{ matrix.app }}
          path: build/release/${{ matrix.app }}.tar.gz
          if-no-files-found: error
          retention-days: 7

  # ----------------------------------------------------------------------------
  # Assemble the final image from this run's builders, extract, publish.
  # ----------------------------------------------------------------------------
  package:
    name: Package and release
    needs: [builders, apps]
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # This job genuinely needs the headroom: it extracts all ten builder
      # trees and duplicates them into the final image's layers. Stock runners
      # start ~89 GB free; the purge buys ~20 GB (rc2 ran at 109 GB free and
      # fit; run 27388041846 ran at 89 GB without it and filled the disk).
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc \
                      /usr/local/share/boost /usr/local/graalvm /usr/local/.ghcup
          sudo docker image prune -af
          df -h /

      - name: Prepare environment
        run: |
          touch ~/.gitconfig
          mkdir -p ~/.ssh
          echo "HOST_UID=$(id -u)" >> "$GITHUB_ENV"
          echo "HOST_GID=$(id -g)" >> "$GITHUB_ENV"

      - name: Login to ghcr.io
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Pull the images the builders pushed for THIS commit and retag to the
      # local names final.Dockerfile COPY --from's. Pulls are strict: a missing
      # image means the handoff is broken and the run must stop here.
      - name: Pull this run's builder images
        run: |
          for b in $(make -s print-builder-targets | jq -r '.[]'); do
            img="apex.builder.$b"
            docker pull "$REGISTRY/$img:$GITHUB_SHA"
            docker tag "$REGISTRY/$img:$GITHUB_SHA" "$img"
          done

      - name: Determine version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            version="${GITHUB_REF_NAME#v}"   # 0.0.1, or 0.0.1-rc1 for a pre-release
          else
            version="0.0.0-ci"               # rehearsal: same steps, throwaway version
          fi
          base="${version%%-*}"              # X.Y.Z with any -suffix stripped
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "base=$base" >> "$GITHUB_OUTPUT"
          if [ "$version" = "$base" ]; then echo "prerelease=false"; else echo "prerelease=true"; fi >> "$GITHUB_OUTPUT"

      - name: Verify version matches CMakeLists.txt
        if: startsWith(github.ref, 'refs/tags/')
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG_BASE: ${{ steps.version.outputs.base }}
        run: |
          cmake_version=$(sed -n 's/.*VERSION \([0-9]*\.[0-9]*\.[0-9]*\).*/\1/p' \
            CMakeLists.txt | head -1)
          if [ "$cmake_version" != "$TAG_BASE" ]; then
            echo "ERROR: Tag version ($TAG_BASE) does not match CMakeLists.txt ($cmake_version)"
            exit 1
          fi
          echo "Version verified: $VERSION (base $TAG_BASE)"

      - name: Build all platform artifacts
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: make artifacts VERSION="$VERSION"

      - name: Download app packages
        uses: actions/download-artifact@v8
        with:
          pattern: app-package-*
          merge-multiple: true
          path: build/release

      - name: List artifacts
        run: |
          ls -la output/
          ls -la build/release/

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          name: Apex CSF ${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ steps.version.outputs.prerelease }}
          generate_release_notes: true
          files: |
            output/apex-csf-${{ steps.version.outputs.version }}-x86_64-linux.tar.gz
            output/apex-csf-${{ steps.version.outputs.version }}-x86_64-linux-cuda.tar.gz
            output/apex-csf-${{ steps.version.outputs.version }}-aarch64-jetson.tar.gz
            output/apex-csf-${{ steps.version.outputs.version }}-aarch64-rpi.tar.gz
            output/apex-csf-${{ steps.version.outputs.version }}-riscv64-linux.tar.gz
            output/apex-csf-${{ steps.version.outputs.version }}-stm32.tar.gz
            output/apex-csf-${{ steps.version.outputs.version }}-arduino.tar.gz
            output/apex-csf-${{ steps.version.outputs.version }}-pico.tar.gz
            output/apex-csf-${{ steps.version.outputs.version }}-esp32.tar.gz
            output/apex-csf-${{ steps.version.outputs.version }}-c2000.tar.gz
            output/apex-tools-${{ steps.version.outputs.version }}-x86_64-linux.tar.gz
            output/apex_py_tools-${{ steps.version.outputs.version }}-py3-none-any.whl
            build/release/ApexEdgeDemo.tar.gz
            build/release/ApexHilDemo.tar.gz
