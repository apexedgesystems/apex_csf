# ==============================================================================
# Release -- Build artifacts and publish to GitHub Releases (parallel builders)
#
# Two stages, mirroring the Docker Images DAG so the SDK-heavy firmware builders
# don't contend on one runner:
#
#   builders (matrix, one runner each) -- compile apex for each target into
#     apex.builder.<t>, with a per-target ccache (buildkit-cache-dance keeps the
#     /ccache BuildKit mount warm across runs), and push the image to ghcr.
#   package (fan-in)                   -- pull the 10 builder images, assemble
#     the final image (COPY --from each builder), extract artifacts, build the
#     app packages, and publish the GitHub Release.
#
# Triggers:
#   tag v*            -- full release: build, extract, package, publish.
#   workflow_dispatch -- build all builders + assemble final, publish NOTHING.
#                        Exercises the whole parallel path (and the ccache)
#                        without cutting a release.
#
# A ccache miss only means a cold compile -- ccache is content-addressed, so a
# stale or empty cache can never produce a wrong build.
# ==============================================================================
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io/${{ github.repository }}

jobs:
  # ----------------------------------------------------------------------------
  # Compile each target's builder image in parallel; push to ghcr for the
  # package job to assemble from. Per-target ccache via buildkit-cache-dance.
  # ----------------------------------------------------------------------------
  builders:
    name: builder-${{ matrix.builder }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        builder:
          [cpu, cuda, jetson, rpi, riscv64, stm32, arduino, pico, esp32, c2000]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc \
                      /usr/local/share/boost /usr/local/graalvm /usr/local/.ghcup
          sudo docker image prune -af
          df -h /

      - name: Prepare environment
        run: |
          touch ~/.gitconfig
          mkdir -p ~/.ssh
          echo "HOST_UID=$(id -u)" >> "$GITHUB_ENV"
          echo "HOST_GID=$(id -g)" >> "$GITHUB_ENV"

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull builder's dev image (the FROM)
        env:
          DEV: apex.dev.${{ matrix.builder }}
        run: |
          docker pull "$REGISTRY/apex.base:latest" \
            && docker tag "$REGISTRY/apex.base:latest" apex.base || true
          docker pull "$REGISTRY/$DEV:latest" \
            && docker tag "$REGISTRY/$DEV:latest" "$DEV" || true

      - name: Restore builder ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-builder-${{ matrix.builder }}-${{ github.sha }}
          restore-keys: |
            ccache-builder-${{ matrix.builder }}-
      - name: Prepare ccache dir
        run: mkdir -p .ccache
      - name: Inject ccache into the build mount
        uses: reproducible-containers/buildkit-cache-dance@v3
        continue-on-error: true
        with:
          cache-map: |
            { ".ccache": "/ccache" }

      - name: Build builder image
        run: make docker-builder-${{ matrix.builder }}

      - name: Push builder image
        env:
          IMG: apex.builder.${{ matrix.builder }}
        run: |
          docker tag "$IMG" "$REGISTRY/$IMG:latest"
          docker push "$REGISTRY/$IMG:latest"

  # ----------------------------------------------------------------------------
  # Assemble the final image from the pushed builders, extract, package, publish.
  # ----------------------------------------------------------------------------
  package:
    name: Package and release
    needs: builders
    if: ${{ needs.builders.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc \
                      /usr/local/share/boost /usr/local/graalvm /usr/local/.ghcup
          sudo docker image prune -af
          df -h /

      - name: Prepare environment
        run: |
          touch ~/.gitconfig
          mkdir -p ~/.ssh
          echo "HOST_UID=$(id -u)" >> "$GITHUB_ENV"
          echo "HOST_GID=$(id -g)" >> "$GITHUB_ENV"

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull builder images
        run: |
          for b in cpu cuda jetson rpi riscv64 stm32 arduino pico esp32 c2000; do
            img="apex.builder.$b"
            docker pull "$REGISTRY/$img:latest" \
              && docker tag "$REGISTRY/$img:latest" "$img" || true
          done

      - name: Pull dev images (for app packaging)
        run: |
          for img in apex.base apex.dev.cpu apex.dev.cuda apex.dev.jetson \
                     apex.dev.rpi apex.dev.stm32; do
            docker pull "$REGISTRY/$img:latest" \
              && docker tag "$REGISTRY/$img:latest" "$img" || true
          done

      # --- workflow_dispatch: assemble final to validate the path (no publish) ---
      - name: Assemble final image (validate, no publish)
        if: github.event_name == 'workflow_dispatch'
        run: make docker-final VERSION=0.0.0-ci

      # --- tag push: full release ---
      - name: Extract version from tag
        if: startsWith(github.ref, 'refs/tags/')
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify version matches CMakeLists.txt
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cmake_version=$(sed -n 's/.*VERSION \([0-9]*\.[0-9]*\.[0-9]*\).*/\1/p' \
            CMakeLists.txt | head -1)
          tag_version="${{ steps.version.outputs.version }}"
          if [ "$cmake_version" != "$tag_version" ]; then
            echo "ERROR: Tag version ($tag_version) does not match CMakeLists.txt ($cmake_version)"
            exit 1
          fi
          echo "Version verified: $tag_version"

      - name: Build all platform artifacts
        if: startsWith(github.ref, 'refs/tags/')
        run: make artifacts VERSION=${{ steps.version.outputs.version }}

      - name: Build app release packages
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          make release APP=ApexEdgeDemo
          make release APP=ApexHilDemo

      - name: List artifacts
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          ls -la output/
          ls -la build/release/ 2>/dev/null || true

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          name: Apex CSF ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            output/apex-csf-${{ steps.version.outputs.version }}-x86_64-linux.tar.gz
            output/apex-csf-${{ steps.version.outputs.version }}-x86_64-linux-cuda.tar.gz
            output/apex-csf-${{ steps.version.outputs.version }}-aarch64-jetson.tar.gz
            output/apex-csf-${{ steps.version.outputs.version }}-aarch64-rpi.tar.gz
            output/apex-csf-${{ steps.version.outputs.version }}-riscv64-linux.tar.gz
            output/apex-csf-${{ steps.version.outputs.version }}-stm32.tar.gz
            output/apex-csf-${{ steps.version.outputs.version }}-arduino.tar.gz
            output/apex-csf-${{ steps.version.outputs.version }}-pico.tar.gz
            output/apex-csf-${{ steps.version.outputs.version }}-esp32.tar.gz
            output/apex-csf-${{ steps.version.outputs.version }}-c2000.tar.gz
            output/apex-tools-${{ steps.version.outputs.version }}-x86_64-linux.tar.gz
            output/apex_py_tools-${{ steps.version.outputs.version }}-py3-none-any.whl
            build/release/ApexEdgeDemo.tar.gz
            build/release/ApexHilDemo.tar.gz
