# ==============================================================================
# Release -- Build artifacts and publish to GitHub Releases (parallel builders)
#
# Four jobs; the dispatch rehearsal and a tag release run the SAME steps, so a
# green rehearsal is proof the next tag will publish:
#
#   targets                            -- resolve the builder/app matrices from
#     the make registries, derive VERSION from the ref, and verify a tag
#     against CMakeLists.txt before any build spends a minute.
#   builders (matrix, one runner each) -- compile apex for each target into
#     apex.builder.<t>, extract that platform's tarball on the same runner
#     (make artifact-<t>), and upload it as a workflow artifact. Each build
#     tree stays on the runner that built it; a full per-platform tree is
#     large enough that collecting all ten on the fan-in runner would exhaust
#     its disk. Workflow artifacts are run-scoped, so the fan-in consumes
#     exactly this run's outputs with no registry handoff to race on.
#   apps (parallel with the builders)  -- build the app release packages in the
#     platform dev images (they compile from source and consume no builder
#     image) and upload the tarballs the same way.
#   provenance (parallel too)          -- generate the CycloneDX SBOM and the
#     THIRD_PARTY_NOTICES derived from it, inside the dev image with the same
#     invocation nightly's scanners use.
#   package (fan-in)                   -- download everything, assemble the
#     distribution set (SHA256SUMS over every asset, build-metadata.json with
#     the builder/app image digests, release notes extracted from CHANGELOG),
#     verify it is complete against the registries, and -- only on a tag
#     push -- publish the GitHub Release. No docker, no image pulls.
#
# Triggers:
#   tag v*            -- full release: everything below, then publish.
#   workflow_dispatch -- everything EXCEPT publish. The publish step is gated
#                        on the push event, not the ref, so dispatching on a
#                        tag ref is still only a rehearsal. VERSION falls back
#                        to 0.0.0-ci.
#
# Runs are serialized by a non-cancelling concurrency group: overlapping runs
# would race on the shared ccache keys, and releases should land one at a time.
#
# A ccache miss only means a cold compile -- ccache is content-addressed, so a
# stale or empty cache can never produce a wrong build.
# ==============================================================================
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release

env:
  REGISTRY: ghcr.io/${{ github.repository }}

jobs:
  # ----------------------------------------------------------------------------
  # Resolve the builder matrix from mk/docker.mk BUILDER_TARGETS -- the single
  # source of truth for the release target set (nightly.yml pattern).
  # ----------------------------------------------------------------------------
  targets:
    name: Resolve targets and version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      list: ${{ steps.list.outputs.list }}
      apps: ${{ steps.list.outputs.apps }}
      version: ${{ steps.version.outputs.version }}
      prerelease: ${{ steps.version.outputs.prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Read builder targets and released apps from the registries
        id: list
        run: |
          echo "list=$(make -s print-builder-targets)" >> "$GITHUB_OUTPUT"
          echo "apps=$(make -s print-release-apps)" >> "$GITHUB_OUTPUT"
      - name: Determine version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            version="${GITHUB_REF_NAME#v}"   # 0.0.1, or 0.0.1-rc1 for a pre-release
          else
            version="0.0.0-ci"               # rehearsal: same steps, throwaway version
          fi
          base="${version%%-*}"              # X.Y.Z with any -suffix stripped
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "base=$base" >> "$GITHUB_OUTPUT"
          if [ "$version" = "$base" ]; then echo "prerelease=false"; else echo "prerelease=true"; fi >> "$GITHUB_OUTPUT"
      # Fail a mismatched tag here, in seconds, not after ten builds.
      - name: Verify version matches CMakeLists.txt
        if: startsWith(github.ref, 'refs/tags/')
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG_BASE: ${{ steps.version.outputs.base }}
        run: |
          cmake_version=$(sed -n 's/.*VERSION \([0-9]*\.[0-9]*\.[0-9]*\).*/\1/p' \
            CMakeLists.txt | head -1)
          if [ "$cmake_version" != "$TAG_BASE" ]; then
            echo "ERROR: Tag version ($TAG_BASE) does not match CMakeLists.txt ($cmake_version)"
            exit 1
          fi
          echo "Version verified: $VERSION (base $TAG_BASE)"
      # The release body is this version's CHANGELOG section (package job), so
      # a forgotten entry fails here, in seconds, like the CMake check above.
      - name: Verify CHANGELOG has this version's section
        if: startsWith(github.ref, 'refs/tags/')
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if ! grep -Fq "## [$VERSION]" CHANGELOG.md; then
            echo "ERROR: CHANGELOG.md has no '## [$VERSION]' section"
            exit 1
          fi
          echo "CHANGELOG section found for $VERSION"

  # ----------------------------------------------------------------------------
  # Compile each target's builder image in parallel; push to ghcr for the
  # package job to assemble from. Per-target ccache via buildkit-cache-dance.
  # ----------------------------------------------------------------------------
  builders:
    name: builder-${{ matrix.builder }}
    needs: targets
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        builder: ${{ fromJSON(needs.targets.outputs.list) }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Prepare environment
        run: |
          touch ~/.gitconfig
          mkdir -p ~/.ssh
          echo "HOST_UID=$(id -u)" >> "$GITHUB_ENV"
          echo "HOST_GID=$(id -g)" >> "$GITHUB_ENV"

      - name: Login to ghcr.io
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # The dev image is the builder's FROM and the only image input
      # (docker/builder.Dockerfile); a failed pull must fail here, not as a
      # confusing BuildKit error two steps later.
      # The builder's FROM is its compose DEV_IMAGE, not always apex.dev.<arch>:
      # the lean tiers route builder-cuda to apex.cuda-build and builder-cpu to
      # apex.build-base. Read it from compose so this tracks any retiering.
      - name: Pull builder's base image (the FROM)
        run: |
          DEV=$(docker compose config "builder-${{ matrix.builder }}" 2>/dev/null \
                | sed -nE 's/.*DEV_IMAGE:[[:space:]]*"?([^"]+)"?.*/\1/p' | head -1)
          [ -n "$DEV" ] || DEV="apex.dev.${{ matrix.builder }}"
          echo "builder-${{ matrix.builder }} compiles FROM $DEV"
          docker pull "$REGISTRY/$DEV:latest"
          docker tag "$REGISTRY/$DEV:latest" "$DEV"
          echo "DEV_IMAGE=$DEV" >> "$GITHUB_ENV"

      - name: Restore builder ccache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: .ccache
          key: ccache-builder-${{ matrix.builder }}-${{ github.sha }}
          restore-keys: |
            ccache-builder-${{ matrix.builder }}-
      - name: Prepare ccache dir
        run: mkdir -p .ccache
      # The injected mount must carry the SAME uid/gid options as
      # builder.Dockerfile's cache mount: BuildKit forks cache identity on
      # differing mount options, so a plain map injects into (and extracts
      # from) a cache the build never sees. continue-on-error stays: extraction
      # runs as a post step, and a cache hiccup after a successful build must
      # not fail the release; the in-build ccache -s line is the hit-rate
      # signal.
      - name: Compose ccache cache map (mount identity must match)
        id: ccache-map
        run: |
          printf 'map={ ".ccache": { "target": "/ccache", "uid": "%s", "gid": "%s" } }\n' \
            "$(id -u)" "$(id -g)" >> "$GITHUB_OUTPUT"
      - name: Inject ccache into the build mount
        uses: reproducible-containers/buildkit-cache-dance@5422eac04292c961a382e0f584ea0f03ad9da723 # v3
        continue-on-error: true
        with:
          cache-map: ${{ steps.ccache-map.outputs.map }}

      - name: Build builder image
        run: make docker-builder-${{ matrix.builder }}

      # Tar this platform's tree here, on the runner that built it; the cpu
      # builder also carries the CLI tools and the python wheel.
      - name: Extract platform artifact
        env:
          VERSION: ${{ needs.targets.outputs.version }}
          BUILDER: ${{ matrix.builder }}
        run: |
          make "artifact-$BUILDER" VERSION="$VERSION"
          if [ "$BUILDER" = cpu ]; then make artifact-tools VERSION="$VERSION"; fi

      # Provenance: record which image compiled this artifact. The package job
      # folds these into build-metadata.json; they ride the artifact upload
      # under meta/ and are never published as release assets themselves.
      - name: Record builder image digest
        env:
          BUILDER: ${{ matrix.builder }}
        run: |
          mkdir -p output/meta
          digest=$(docker image inspect \
            --format '{{index .RepoDigests 0}}' "$REGISTRY/$DEV_IMAGE:latest")
          printf '{"builder":"%s","from_image":"%s","digest":"%s"}\n' \
            "$BUILDER" "$DEV_IMAGE" "$digest" > "output/meta/builder-$BUILDER.json"
          cat "output/meta/builder-$BUILDER.json"

      - name: Upload platform artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: platform-${{ matrix.builder }}
          path: output/
          if-no-files-found: error
          retention-days: 7

  # ----------------------------------------------------------------------------
  # Build each released app's packages in parallel with the builders and with
  # each other: make release APP=<a> compiles from source inside the platform
  # dev images and consumes no builder output, so it has no data dependency on
  # the matrix -- running the apps serially or behind the builders would add
  # their full compile time to the critical path for nothing. Matrix and
  # per-app image lists come from mk/release.mk RELEASE_APPS via
  # print-release-apps.
  # ----------------------------------------------------------------------------
  apps:
    name: apps-${{ matrix.app }}
    needs: targets
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.targets.outputs.apps) }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Prepare environment
        run: |
          touch ~/.gitconfig
          mkdir -p ~/.ssh
          echo "HOST_UID=$(id -u)" >> "$GITHUB_ENV"
          echo "HOST_GID=$(id -g)" >> "$GITHUB_ENV"

      - name: Login to ghcr.io
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull this app's platform dev images
        env:
          IMAGES: ${{ matrix.images }}
        run: |
          for img in $IMAGES; do
            docker pull "$REGISTRY/$img:latest"
            docker tag "$REGISTRY/$img:latest" "$img"
          done

      - name: Build app release package
        env:
          APP: ${{ matrix.app }}
        run: make release APP="$APP"

      # Same provenance shape as the builders: the images this package was
      # compiled in, for build-metadata.json.
      - name: Record app image digests
        env:
          APP: ${{ matrix.app }}
          IMAGES: ${{ matrix.images }}
        run: |
          for img in $IMAGES; do
            docker image inspect \
              --format '{{index .RepoDigests 0}}' "$REGISTRY/$img:latest"
          done | python3 -c '
          import json, os, sys
          digests = [line.strip() for line in sys.stdin if line.strip()]
          print(json.dumps({"app": os.environ["APP"], "image_digests": digests}))
          ' > "build/release/meta-$APP.json"
          cat "build/release/meta-$APP.json"

      - name: Upload app package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: app-package-${{ matrix.app }}
          path: |
            build/release/${{ matrix.app }}.tar.gz
            build/release/meta-${{ matrix.app }}.json
          if-no-files-found: error
          retention-days: 7

  # ----------------------------------------------------------------------------
  # SBOM + third-party notices at the release ref, generated inside the dev
  # image with the same compose invocation nightly's scanners use, in parallel
  # with the builders. The package job stamps and attaches the outputs.
  # ----------------------------------------------------------------------------
  provenance:
    name: SBOM and notices
    needs: targets
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up dev image
        uses: ./.github/actions/dev-setup
        with:
          registry: ${{ env.REGISTRY }}
          actor: ${{ github.actor }}
          token: ${{ secrets.GITHUB_TOKEN }}
          service: dev

      - name: Generate SBOM and notices
        run: docker compose run --rm -T dev make notices

      - name: Upload provenance inputs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: provenance
          path: |
            build/security/sbom.cdx.json
            build/security/THIRD_PARTY_NOTICES.md
          if-no-files-found: error
          retention-days: 7

  # ----------------------------------------------------------------------------
  # Artifact fan-in: download what the builders, apps, and provenance jobs
  # uploaded, assemble the distribution set under dist/, and publish on a tag
  # push. Checkout is for CHANGELOG.md (release notes) only -- still no docker
  # and no image pulls, so nothing here can fill a disk or race a registry.
  # Every step below the downloads runs on the rehearsal too; only the final
  # publish is tag-gated.
  # ----------------------------------------------------------------------------
  package:
    name: Package and release
    needs: [targets, builders, apps, provenance]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Download platform artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: platform-*
          merge-multiple: true
          path: output

      - name: Download app packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: app-package-*
          merge-multiple: true
          path: build/release

      - name: Download provenance inputs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: provenance
          path: provenance

      # Stage every publishable file into dist/ and hold the set against the
      # registries: each resolved builder target and released app must have
      # produced its asset, so a failed leg surfaces here as a hard error --
      # never as a silently thinner release.
      - name: Assemble and verify the distribution set
        env:
          VERSION: ${{ needs.targets.outputs.version }}
          BUILDERS: ${{ needs.targets.outputs.list }}
          APPS: ${{ needs.targets.outputs.apps }}
        run: |
          mkdir -p dist
          cp output/apex-csf-"$VERSION"-*.tar.gz dist/
          cp output/apex-tools-"$VERSION"-*.tar.gz dist/
          cp output/apex_py_tools-"$VERSION"-*.whl dist/
          cp build/release/*.tar.gz dist/
          cp provenance/sbom.cdx.json "dist/apex-csf-$VERSION-sbom.cdx.json"
          cp provenance/THIRD_PARTY_NOTICES.md dist/
          n_platform=$(ls dist/apex-csf-"$VERSION"-*.tar.gz | wc -l)
          n_apps=$(ls build/release/*.tar.gz | wc -l)
          want_platform=$(python3 -c 'import json,os; print(len(json.loads(os.environ["BUILDERS"])))')
          want_apps=$(python3 -c 'import json,os; print(len(json.loads(os.environ["APPS"])))')
          echo "platform tarballs: $n_platform/$want_platform, app packages: $n_apps/$want_apps"
          [ "$n_platform" -eq "$want_platform" ] || { echo "ERROR: missing platform tarballs"; exit 1; }
          [ "$n_apps" -eq "$want_apps" ] || { echo "ERROR: missing app packages"; exit 1; }
          ls -la dist/

      - name: Write build metadata
        env:
          VERSION: ${{ needs.targets.outputs.version }}
        run: |
          python3 - <<'EOF'
          import glob, json, os

          def load(pattern):
              return [json.load(open(p)) for p in sorted(glob.glob(pattern))]

          meta = {
              "version": os.environ["VERSION"],
              "source_commit": os.environ["GITHUB_SHA"],
              "source_ref": os.environ["GITHUB_REF"],
              "workflow_run": os.environ["GITHUB_SERVER_URL"]
              + "/" + os.environ["GITHUB_REPOSITORY"]
              + "/actions/runs/" + os.environ["GITHUB_RUN_ID"],
              "builders": load("output/meta/builder-*.json"),
              "apps": load("build/release/meta-*.json"),
          }
          with open("dist/build-metadata.json", "w") as f:
              json.dump(meta, f, indent=2, sort_keys=True)
              f.write("\n")
          EOF
          cat dist/build-metadata.json

      - name: Write SHA256SUMS
        run: |
          cd dist
          sha256sum -- * > ../SHA256SUMS
          mv ../SHA256SUMS .
          cat SHA256SUMS

      # The release body is the CHANGELOG section for this version; the
      # rehearsal extracts Unreleased instead, so the mechanics are proven on
      # every dispatch. The targets job already guaranteed the section exists
      # on a tag.
      - name: Extract release notes from CHANGELOG
        env:
          VERSION: ${{ needs.targets.outputs.version }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            section="$VERSION"
          else
            section="Unreleased"
          fi
          awk -v sec="$section" '
            /^## \[/ { in_sec = (index($0, "## [" sec "]") == 1); next }
            in_sec && /^\[/ { exit }
            in_sec { print }
          ' CHANGELOG.md > release-notes.md
          echo "--- release notes ($section) ---"
          cat release-notes.md
          if [ "${GITHUB_EVENT_NAME}" = "push" ] && ! [ -s release-notes.md ]; then
            echo "ERROR: empty release notes for $VERSION"
            exit 1
          fi

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          name: Apex CSF ${{ needs.targets.outputs.version }}
          draft: false
          prerelease: ${{ needs.targets.outputs.prerelease }}
          generate_release_notes: false
          body_path: release-notes.md
          fail_on_unmatched_files: true
          files: dist/*
