# ==============================================================================
# Nightly -- heavier checks that run once per day on main, off the PR path.
#
# The set of checks is the single source of truth in mk/checks.mk
# (CHECKS_NIGHTLY); `make print-nightly-checks` emits it as a JSON array that
# drives the matrix below. To add or drop a nightly check, edit the registry --
# no change to this workflow is needed.
#
# Each matrix leg pulls the CPU dev image and runs one `make <check>` in it.
# fail-fast is off so one failing check never cancels the others.
# ==============================================================================
name: Nightly

on:
  schedule:
    - cron: "0 7 * * *"   # 07:00 UTC daily (~midnight Pacific)
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  set-matrix:
    name: Resolve nightly checks
    runs-on: ubuntu-latest
    outputs:
      checks: ${{ steps.list.outputs.checks }}
      ccache: ${{ steps.list.outputs.ccache }}
      builders: ${{ steps.list.outputs.builders }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Read nightly checks and builder targets from the registries
        id: list
        run: |
          echo "checks=$(make -s print-nightly-checks)" >> "$GITHUB_OUTPUT"
          echo "ccache=$(make -s print-ccache-checks)" >> "$GITHUB_OUTPUT"
          echo "builders=$(make -s print-builder-targets)" >> "$GITHUB_OUTPUT"

  check:
    name: ${{ matrix.check }}
    needs: set-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 90

    strategy:
      fail-fast: false
      matrix:
        check: ${{ fromJSON(needs.set-matrix.outputs.checks) }}

    env:
      REGISTRY: ghcr.io/${{ github.repository }}
      # Bind /ccache to a host dir so actions/cache keeps the CHECKS_CCACHE
      # legs (tsan, rtsan, coverage-check, hardened) warm across nights.
      COMPOSE_FILE: docker-compose.yml:docker-compose.ci.yml

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up dev image
        uses: ./.github/actions/dev-setup
        with:
          registry: ${{ env.REGISTRY }}
          actor: ${{ github.actor }}
          token: ${{ secrets.GITHUB_TOKEN }}

      # Only the legs that compile C++ through ccache persist one
      # (CHECKS_CCACHE in mk/checks.mk); the scanner and tooling legs would
      # mint empty ~200-byte cache entries every night. Exact membership via
      # fromJSON -- substring matching would make tsan match rtsan.
      - name: Restore ccache
        if: contains(fromJSON(needs.set-matrix.outputs.ccache), matrix.check)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: .ccache
          key: ccache-nightly-${{ matrix.check }}-${{ github.sha }}
          restore-keys: |
            ccache-nightly-${{ matrix.check }}-
      - name: Prepare ccache dir
        if: contains(fromJSON(needs.set-matrix.outputs.ccache), matrix.check)
        run: mkdir -p .ccache

      - name: Run ${{ matrix.check }}
        # SCAN_GATE=1 makes the advisory scanners (trivy/osv/semgrep) fail the
        # job on findings; the other checks ignore it. Keeps the PR gate
        # deterministic while nightly surfaces new CVEs/findings for triage.
        run: docker compose run --rm -T dev make ${{ matrix.check }} SCAN_GATE=1

      - name: Upload coverage report
        if: ${{ always() && matrix.check == 'coverage-check' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-report
          path: build/hosted-x86_64-coverage/coverage/
          retention-days: 14

      - name: Upload tooling coverage report
        if: ${{ always() && (matrix.check == 'coverage-rust' || matrix.check == 'coverage-py') }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-${{ matrix.check }}
          path: |
            tools/py/coverage-py.xml
            tools/rust/coverage-rust.lcov
          if-no-files-found: ignore
          retention-days: 14

  # ----------------------------------------------------------------------------
  # Warm the release builders' ccache from main. Actions cache scopes restores
  # to the requesting ref plus the default branch, so entries saved by tag or
  # branch runs are invisible to the next tag -- only main-scoped entries make
  # a release build warm. This matrix compiles each builder image nightly
  # (no push) with the same cache keys release.yml uses, which also makes it
  # the daily canary for the cross release-tree compiles that otherwise run
  # only at tag time.
  # ----------------------------------------------------------------------------
  builder-warm:
    name: warm-${{ matrix.builder }}
    needs: set-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 180

    strategy:
      fail-fast: false
      matrix:
        builder: ${{ fromJSON(needs.set-matrix.outputs.builders) }}

    env:
      REGISTRY: ghcr.io/${{ github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # The builder pulls a multi-GB dev image (jetson is FROM dev-cuda) and
      # builds a full tree; reclaim the unused host SDKs first for headroom.
      - name: Reclaim disk
        uses: ./.github/actions/reclaim-disk

      - name: Prepare environment
        run: |
          touch ~/.gitconfig
          mkdir -p ~/.ssh
          echo "HOST_UID=$(id -u)" >> "$GITHUB_ENV"
          echo "HOST_GID=$(id -g)" >> "$GITHUB_ENV"

      - name: Login to ghcr.io
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # The builder's FROM is its compose DEV_IMAGE, not always apex.dev.<arch>:
      # the lean tiers route builder-cuda to apex.cuda-build and builder-cpu to
      # apex.build-base. Read it from compose so this tracks any retiering.
      - name: Pull builder's base image (the FROM)
        run: |
          DEV=$(docker compose config "builder-${{ matrix.builder }}" 2>/dev/null \
                | sed -nE 's/.*DEV_IMAGE:[[:space:]]*"?([^"]+)"?.*/\1/p' | head -1)
          [ -n "$DEV" ] || DEV="apex.dev.${{ matrix.builder }}"
          echo "builder-${{ matrix.builder }} compiles FROM $DEV"
          docker pull "$REGISTRY/$DEV:latest"
          docker tag "$REGISTRY/$DEV:latest" "$DEV"

      - name: Restore builder ccache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: .ccache
          key: ccache-builder-${{ matrix.builder }}-${{ github.sha }}
          restore-keys: |
            ccache-builder-${{ matrix.builder }}-
      - name: Prepare ccache dir
        run: mkdir -p .ccache
      # Mount identity must match builder.Dockerfile's uid/gid cache mount --
      # see release.yml for the full note.
      - name: Compose ccache cache map (mount identity must match)
        id: ccache-map
        run: |
          printf 'map={ ".ccache": { "target": "/ccache", "uid": "%s", "gid": "%s" } }\n' \
            "$(id -u)" "$(id -g)" >> "$GITHUB_OUTPUT"
      - name: Inject ccache into the build mount
        uses: reproducible-containers/buildkit-cache-dance@5422eac04292c961a382e0f584ea0f03ad9da723 # v3
        continue-on-error: true
        with:
          cache-map: ${{ steps.ccache-map.outputs.map }}

      - name: Build builder image (warm only, no push)
        run: make docker-builder-${{ matrix.builder }}

  # ----------------------------------------------------------------------------
  # ghcr garbage collection. Re-pushing :latest dev images strands the previous
  # digest as an untagged version (never auto-collected), and earlier release
  # flows left sha-tagged apex.builder.* sets behind (the release pipe now
  # hands off via workflow artifacts, not ghcr). Deletes untagged versions of
  # this repo's apex.* packages, plus builder versions whose tags are all
  # commit shas older than 14 days.
  # ----------------------------------------------------------------------------
  ghcr-gc:
    name: ghcr garbage collection
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      packages: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # Package names come from the make registries (print-ghcr-packages), not
      # the org package-list endpoint: GITHUB_TOKEN cannot enumerate org
      # packages, and a failed enumeration inside a pipeline reads as "nothing
      # to do". Per-package 404s are fine (image not published yet); any other
      # API failure is fatal so a permission problem can never pass silently.
      - name: Delete untagged and stale builder versions
        run: |
          set -euo pipefail
          org="${GITHUB_REPOSITORY%%/*}"
          repo="${GITHUB_REPOSITORY#*/}"
          cutoff=$(date -u -d '14 days ago' +%FT%TZ)
          deleted=0; kept=0
          for name in $(make -s print-ghcr-packages); do
            pkg="$repo/$name"
            enc=$(printf '%s' "$pkg" | sed 's|/|%2F|g')
            if ! versions=$(gh api --paginate "/orgs/$org/packages/container/$enc/versions" \
                              --jq '.[] | [.id, .created_at, (.metadata.container.tags | join(" "))] | @tsv' 2>&1); then
              case "$versions" in
                *"HTTP 404"*|*"Not Found"*) echo "skip $pkg (not published)"; continue ;;
                *) echo "::error::listing $pkg failed: $versions"; exit 1 ;;
              esac
            fi
            [ -n "$versions" ] || continue
            while IFS=$'\t' read -r id created tags; do
              del=false
              if [ -z "$tags" ]; then
                del=true                       # untagged: stranded digest
              elif [ "${name#apex.builder.}" != "$name" ]; then
                # builder package: delete only if EVERY tag is a 40-hex sha
                # and the version is older than the cutoff
                if [ "$created" \< "$cutoff" ] \
                   && ! printf '%s\n' $tags | grep -qvE '^[0-9a-f]{40}$'; then
                  del=true
                fi
              fi
              if [ "$del" = true ]; then
                gh api --method DELETE "/orgs/$org/packages/container/$enc/versions/$id"
                echo "deleted $pkg version $id (created $created, tags: ${tags:-none})"
                deleted=$((deleted+1))
              else
                kept=$((kept+1))
              fi
            done <<< "$versions"
          done
          echo "ghcr-gc: deleted $deleted version(s), kept $kept"
          # A registry with published images and zero visible versions means
          # the token cannot see them -- fail loudly rather than report clean.
          if [ "$deleted" -eq 0 ] && [ "$kept" -eq 0 ]; then
            echo "::error::no package versions visible to the token"
            exit 1
          fi

  # ----------------------------------------------------------------------------
  # Coverage summary -- one consolidated table for the three ecosystems.
  # Reads the coverage artifacts the matrix legs uploaded and renders actuals
  # against the floors (parsed live from mk, so the table never drifts from the
  # gate). Advisory surface only; the floors themselves gate inside the legs.
  # ----------------------------------------------------------------------------
  coverage-summary:
    name: Coverage summary
    needs: check
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Download coverage artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: coverage-*
          path: cov
      - name: Consolidate
        run: |
          floor() { grep -hoE "$1 *\?= *[0-9]+" $2 | grep -oE "[0-9]+$"; }
          FL_LINE=$(floor COVERAGE_MIN_LINE mk/coverage.mk)
          FL_REGION=$(floor COVERAGE_MIN_REGION mk/coverage.mk)
          FL_RUST=$(floor COVERAGE_RUST_MIN_LINE mk/test.mk)
          FL_PY=$(floor COVERAGE_PY_MIN_LINE mk/test.mk)
          idx=$(find cov/coverage-report -path "*/html/index.html" | head -1)
          read -r CPP_LINE CPP_REGION < <(grep -oE "Totals.*" "$idx" | grep -oE "[0-9]+\.[0-9]+%" | sed -n '2p;3p' | tr -d '%' | paste -sd' ')
          RUST=$(awk -F: '/^LF:/{lf+=$2} /^LH:/{lh+=$2} END{if(lf)printf "%.1f", 100*lh/lf}' $(find cov -name coverage-rust.lcov | head -1))
          PY=$(grep -oE 'line-rate="[0-9.]+"' $(find cov -name coverage-py.xml | head -1) | head -1 | grep -oE "[0-9.]+" | awk '{printf "%.1f", $1*100}')
          {
            echo "## Coverage summary"
            echo ""
            echo "| Ecosystem | Metric | Actual | Floor |"
            echo "|---|---|---|---|"
            echo "| C++ | line | ${CPP_LINE}% | ${FL_LINE} |"
            echo "| C++ | region | ${CPP_REGION}% | ${FL_REGION} |"
            echo "| rust tools | line | ${RUST}% | ${FL_RUST} |"
            echo "| python tools | line | ${PY}% | ${FL_PY} |"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::notice title=Coverage::C++ line ${CPP_LINE}%/${FL_LINE} region ${CPP_REGION}%/${FL_REGION}; rust ${RUST}%/${FL_RUST}; py ${PY}%/${FL_PY}"
