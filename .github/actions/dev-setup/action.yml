name: Dev image setup
description: >
  Prepare the environment, log in to ghcr.io, and make a dev image available --
  pulled from the registry cache, or rebuilt from the Dockerfiles when the PR
  changed docker/.

inputs:
  registry:
    description: GHCR registry base, e.g. ghcr.io/<owner>/<repo>
    required: true
  actor:
    description: GitHub actor used for registry login
    required: true
  token:
    description: GITHUB_TOKEN used for registry login
    required: true
  service:
    description: Compose service to prepare (dev, dev-cuda, or cuda-build)
    default: dev
  rebuild:
    description: Rebuild base and the service image from the Dockerfiles instead of using the pulled cache
    default: "false"

runs:
  using: composite
  steps:
    - name: Prepare environment
      shell: bash
      run: |
        touch ~/.gitconfig
        mkdir -p ~/.ssh
        echo "HOST_UID=$(id -u)" >> "$GITHUB_ENV"
        echo "HOST_GID=$(id -g)" >> "$GITHUB_ENV"

    - name: Login to ghcr.io
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
      with:
        registry: ghcr.io
        username: ${{ inputs.actor }}
        password: ${{ inputs.token }}

    - name: Resolve image tag
      id: img
      shell: bash
      env:
        SERVICE: ${{ inputs.service }}
      run: |
        # tag = image the service produces; parent = its FROM image; parent_svc
        # = the compose service that builds that parent (for the rebuild path).
        case "$SERVICE" in
          dev)        tag=apex.dev.cpu;    parent=apex.base;       parent_svc=base ;;
          dev-cuda)   tag=apex.dev.cuda;   parent=apex.base;       parent_svc=base ;;
          cuda-build) tag=apex.cuda-build; parent=apex.build-base; parent_svc=build-base ;;
          build-base) tag=apex.build-base; parent=;               parent_svc=build-base ;;
          *) echo "dev-setup: unknown service '$SERVICE'" >&2; exit 1 ;;
        esac
        {
          echo "tag=$tag"
          echo "parent=$parent"
          echo "parent_svc=$parent_svc"
        } >> "$GITHUB_OUTPUT"

    - name: Pull cached images
      shell: bash
      env:
        REGISTRY: ${{ inputs.registry }}
        TAG: ${{ steps.img.outputs.tag }}
        PARENT: ${{ steps.img.outputs.parent }}
      run: |
        # A root tier (build-base) has no parent to pull.
        if [ -n "$PARENT" ]; then
          docker pull "$REGISTRY/$PARENT:latest" \
            && docker tag "$REGISTRY/$PARENT:latest" "$PARENT" || true
        fi
        docker pull "$REGISTRY/$TAG:latest" \
          && docker tag "$REGISTRY/$TAG:latest" "$TAG" || true

    # Build through the registry layer cache (docker-compose.ci-cache.yml,
    # the same overlay docker-build-push uses): the pulled :latest images
    # carry inline cache metadata, so only the layers an image-input change
    # actually invalidated are rebuilt -- not the whole SDK stack from
    # scratch, in every job that asked for a rebuild.
    - name: Rebuild images from Dockerfiles
      if: inputs.rebuild == 'true'
      shell: bash
      env:
        SERVICE: ${{ inputs.service }}
        PARENT_SVC: ${{ steps.img.outputs.parent_svc }}
        REGISTRY: ${{ inputs.registry }}
      run: |
        # Build the parent first so the service's FROM resolves -- unless the
        # service is its own root (build-base), in which case build it once.
        if [ "$PARENT_SVC" != "$SERVICE" ]; then
          docker compose -f docker-compose.yml -f docker-compose.ci-cache.yml build "$PARENT_SVC"
        fi
        docker compose -f docker-compose.yml -f docker-compose.ci-cache.yml build "$SERVICE"
