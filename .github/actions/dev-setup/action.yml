name: Dev image setup
description: Prepare the environment, log in to ghcr.io, and pull the cached CPU dev image.

inputs:
  registry:
    description: GHCR registry base, e.g. ghcr.io/<owner>/<repo>
    required: true
  actor:
    description: GitHub actor used for registry login
    required: true
  token:
    description: GITHUB_TOKEN used for registry login
    required: true

runs:
  using: composite
  steps:
    - name: Prepare environment
      shell: bash
      run: |
        touch ~/.gitconfig
        mkdir -p ~/.ssh
        echo "HOST_UID=$(id -u)" >> "$GITHUB_ENV"
        echo "HOST_GID=$(id -g)" >> "$GITHUB_ENV"

    - name: Login to ghcr.io
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ inputs.actor }}
        password: ${{ inputs.token }}

    - name: Pull cached dev image
      shell: bash
      run: |
        docker pull ${{ inputs.registry }}/apex.dev.cpu:latest \
          && docker tag ${{ inputs.registry }}/apex.dev.cpu:latest apex.dev.cpu || true
