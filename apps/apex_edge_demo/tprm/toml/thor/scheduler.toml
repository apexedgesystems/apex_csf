# Scheduler (componentId=1, instanceIndex=0)
# Thor deployment: 2 pools
#   Pool 0 (RT CPU): SystemMonitor telemetry, pinned to cores 4-5, SCHED_FIFO 70
#   Pool 1 (GPU dispatch): All GPU kick/poll tasks, pinned to cores 6-7, SCHED_OTHER
#
# GPU tasks on Pool 1 absorb NVIDIA driver jitter (cudaLaunchKernel can
# occasionally block 50-200us). Pool 0 RT tasks are never affected.

[SchedulerTprmHeader]
numPools = { type = "uint", size = 1, value = 2 }
workersPerPool = { type = "uint", size = 1, value = 2 }
numTasks = { type = "uint", size = 1, value = 11 }

# Component fullUids:
# CONV_FILTER_MODEL    = 0x8200 (33280)
# FFT_ANALYZER_MODEL   = 0x8300 (33536)
# BATCH_STATS_MODEL    = 0x8400 (33792)
# STREAM_COMPACT_MODEL = 0x8500 (34048)
# SYSTEM_MONITOR       = 0xC800 (51200)

