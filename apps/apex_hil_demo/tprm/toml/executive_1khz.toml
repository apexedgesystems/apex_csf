# Executive 1kHz variant (componentId=0, instanceIndex=0)
# Same as executive.toml but with 1000Hz clock for stress testing.
# rtMaxLagTicks scaled proportionally (5 @ 100Hz -> 50 @ 1kHz = 50ms).

[ExecutiveTunableParams]
clockFrequencyHz = { type = "uint", size = 2, value = 1000 }
reserved0 = { type = "uint", size = 2, value = 0 }
rtMode = { type = "uint", size = 1, value = 1 }
reserved1 = { type = "uint", size = 1, value = 0 }
reserved2 = { type = "uint", size = 2, value = 0 }
rtMaxLagTicks = { type = "uint", size = 4, value = 50 }
startupMode = { type = "uint", size = 1, value = 0 }
reserved3 = { type = "uint", size = 1, value = 0 }
reserved4 = { type = "uint", size = 2, value = 0 }
startupDelaySeconds = { type = "uint", size = 4, value = 1 }
shutdownMode = { type = "uint", size = 1, value = 0 }
skipCleanup = { type = "uint", size = 1, value = 0 }
reserved5 = { type = "uint", size = 2, value = 0 }
shutdownAfterSeconds = { type = "uint", size = 4, value = 0 }
reserved6 = { type = "uint", size = 4, value = 0 }
shutdownAtCycle = { type = "uint", size = 8, value = 0 }
watchdogIntervalMs = { type = "uint", size = 4, value = 1000 }
profilingSampleEveryN = { type = "uint", size = 4, value = 0 }

# Thread 0: STARTUP - SCHED_OTHER, priority 0, affinity [3]
[[thread]]
policy = { type = "int", size = 1, value = 0 }
priority = { type = "int", size = 1, value = 0 }
affinityCount = { type = "uint", size = 1, value = 1 }
affinity0 = { type = "uint", size = 1, value = 3 }
affinity1 = { type = "uint", size = 1, value = 255 }
affinity2 = { type = "uint", size = 1, value = 255 }
affinity3 = { type = "uint", size = 1, value = 255 }
affinity4 = { type = "uint", size = 1, value = 255 }
affinity5 = { type = "uint", size = 1, value = 255 }
affinity6 = { type = "uint", size = 1, value = 255 }
affinity7 = { type = "uint", size = 1, value = 255 }

