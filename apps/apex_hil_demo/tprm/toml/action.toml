# ActionComponent (componentId=5, instanceIndex=0, fullUid=0x000500)
# Total: 1616 bytes (ActionEngineTprm)
#
# Use cases:
#   WP0: Altitude > 150m (event 1)
#   WP1: Vertical velocity < 10 m/s (event 2)
#   WP2: Comm loss (state.commLost != 0, event 3)
#   GP0: Altitude > 150m AND Vz < 10 m/s (event 10)
#   NT0: Log warning on altitude limit (event 1)
#   NT1: Log info on low Vz (event 2)
#   NT2: Log warning on comm loss (event 3)
#   NT3: Log error on group fire (event 10)
#   TA0: Zero state bytes 4-7 at cycle 500 (fault injection)
#   TA1: Zero driver thrust.z at cycle 200 for 100 cycles (stuck-at-zero)
#
# Component fullUids:
#   HilPlantModel:  0x7800 (120 << 8)
#   HilDriver:      0x7A00 (122 << 8)
#
# VehicleState (OUTPUT=4) offsets:
#   altitude: 36, len 4 (float)
#   vel.z:    20, len 4 (float)
#
# HilPlantState (STATE=2) offsets:
#   commLost: 48, len 1 (uint8)
#
# ControlCmd (OUTPUT=4, HilDriver) offsets:
#   thrust.z: 8, len 4 (float)

# Enum definitions for action engine types
[__enums__]
# WatchPredicate
GT = 0
LT = 1
GE = 2
LE = 3
EQ = 4
NE = 5
BIT_SET = 6
BIT_CLEAR = 7
CHANGED = 8
# WatchDataType
UINT8 = 0
UINT16 = 1
UINT32 = 2
UINT64 = 3
INT8 = 4
INT16 = 5
INT32 = 6
INT64 = 7
FLOAT32 = 8
FLOAT64 = 9
# DataCategory
STATIC_PARAM = 0
TUNABLE_PARAM = 1
STATE = 2
INPUT = 3
OUTPUT = 4
# GroupLogic (AND=0 already defined above)
OR = 1
# ActionType
DATA_WRITE = 0
COMMAND = 1
ARM_CONTROL = 2
# ActionTrigger (IMMEDIATE=0 conflicts with nothing)
IMMEDIATE = 0
AT_CYCLE = 1
AFTER_CYCLES = 2
AT_TIME = 3
ON_EVENT = 4
# SequenceType
RTS = 0
ATS = 1
# LogSeverity
INFO = 0
WARNING = 1
ERR = 2

