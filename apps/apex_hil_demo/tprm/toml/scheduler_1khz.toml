# Scheduler 1kHz variant (componentId=1, instanceIndex=0)
# Same tasks as scheduler.toml but offsets scaled for 1000Hz clock.
# At 100Hz: telemetry offsets 51-54 (510-540ms into each second).
# At 1000Hz: telemetry offsets 510-540 (same wall-clock positions).
# Comparator/TestPlugin offsets also scaled (10Hz offset 0->0, 10Hz offset 5->50).

[SchedulerTprmHeader]
numPools = { type = "uint", size = 1, value = 1 }
workersPerPool = { type = "uint", size = 1, value = 2 }
numTasks = { type = "uint", size = 1, value = 14 }

# Task 0: HilPlantModel.plantStep - 100Hz, highest priority
[[task]]
fullUid = { type = "uint", size = 4, value = 30720 }
taskUid = { type = "uint", size = 1, value = 1 }
poolIndex = { type = "uint", size = 1, value = 0 }
freqN = { type = "uint", size = 2, value = 100 }
freqD = { type = "uint", size = 2, value = 1 }
offset = { type = "uint", size = 2, value = 0 }
priority = { type = "int", size = 1, value = 127 }
seqGroup = { type = "uint", size = 1, value = 255 }
seqPhase = { type = "uint", size = 1, value = 0 }

