# Scheduler (componentId=1, instanceIndex=0) -- lidar_box demo
# Total: 3 + (4 x 15) = 63 bytes
#
# Task schedule (50 Hz fundamental):
#   50 Hz: LidarBoxProducer  BODY_STEP    priority 50   (writes the frame)
#   50 Hz: ShmRingBridge     BRIDGE_STEP  priority 40   (memcpys the frame to shm)
#    1 Hz: LidarBoxProducer  TELEMETRY    offset 3, priority -64
#    1 Hz: ShmRingBridge     TELEMETRY    offset 7, priority -64
#
# Component fullUids:
#   0xE600 (58880): LidarBoxProducer
#   0xCB00 (51968): ShmRingBridge (-> /lidar_box)
#
# Within each tick, priority orders producer (50) before bridge (40), so the
# bridge always publishes the frame written this tick -- clean
# producer-then-publisher ordering. Telemetry log lines run at the lowest
# priority on staggered 1 Hz offsets.

[SchedulerTprmHeader]
