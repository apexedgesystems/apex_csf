# RTS 001: NOOP Sweep
#
# Connectivity test: sends NOOP to each ops demo component
# with 1-second spacing (100 cycles at 100 Hz). Each step has a 2-second
# timeout with SKIP policy so the sweep continues if a component is unresponsive.
#
# StandaloneSequenceTprm: 8-byte header + 16 steps x 84 bytes = 1352 bytes
#
# Components:
#   0x00D000: WaveGen#0
#   0x00D001: WaveGen#1
#   0x00C900: TelemetryMgr
#   0x00C800: SystemMonitor
#   0x00FA00: TestPlugin

[__enums__]
# ActionType
DATA_WRITE = 0
COMMAND = 1
ARM_CONTROL = 2
# StepTimeoutPolicy
ABORT = 0
SKIP = 1
GOTO_STEP = 2
# StepCompletionAction
NEXT = 0
# WatchPredicate
EQ = 4
# WatchDataType
RAW = 10
# DataCategory
OUTPUT = 4

# ==============================================================================
# Header (8 bytes)
# ==============================================================================
[StandaloneSequenceTprm]
sequenceId   = { type = "uint", size = 2, value = 1 }
eventId      = { type = "uint", size = 2, value = 0 }
stepCount    = { type = "uint", size = 1, value = 5 }
repeatCount  = { type = "uint", size = 1, value = 0 }
type         = { type = "uint", size = 1, value = 0 }
armed        = { type = "uint", size = 1, value = 1 }

# ==============================================================================
# Step 0: NOOP to WaveGen#0 (0x00D000), 100-cycle delay, 200-cycle timeout
# ==============================================================================
[StandaloneSequenceTprm.step_0]
targetFullUid    = { type = "uint", size = 4, value = "0x00D000" }
