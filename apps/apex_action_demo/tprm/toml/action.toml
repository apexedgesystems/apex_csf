# ActionComponent (componentId=5, instanceIndex=0, fullUid=0x000500)
# Total: 1616 bytes (ActionEngineTprm)
#
# Use cases:
#   WP0: Temperature > 50.0 (event 1)
#   WP1: Temperature > 80.0 (event 2)
#   WP2: Overtemp flag != 0 (event 3)
#   WP3: Temperature > 100.0 (event 4)
#   WP4: Temperature == 0.0 (event 5) - nested trigger detection
#   GP0: Temperature > 80.0 AND overtemp flag set (event 10)
#   GP1: WP0 OR WP3 (event 11)
#   NT0: Log warning on temp > 50 (event 1)
#   NT1: Log warning on temp > 80 (event 2)
#   NT2: Log error on overtemp (event 3)
#   NT3: Log error on group fire (event 10)
#   NT4: Log error on fault detection (event 5)
#   NT5: Log info on OR group fire (event 11)
#
# Component fullUids:
#   SensorModel:    0xD200 (210 << 8)
#   DataTransform:  0xCA00 (202 << 8)
#
# SensorOutput (OUTPUT=4) offsets:
#   temperature:     0, len 4 (float)
#   temperatureRate: 4, len 4 (float)
#   overtemp:        8, len 1 (uint8)
#
# SensorState (STATE=2) offsets:
#   stepCount:  0, len 4 (uint32)
#   wrapCount:  4, len 4 (uint32)
#
# DataTransform opcodes:
#   SET_TARGET=0x0609, ARM_ENTRY=0x0601, DISARM_ENTRY=0x0602
#   PUSH_ZERO_MASK=0x0603, PUSH_HIGH_MASK=0x0604, PUSH_FLIP_MASK=0x0605
#   APPLY_ENTRY=0x060A, APPLY_ALL=0x060B, CLEAR_ALL=0x0608

