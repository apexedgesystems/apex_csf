LT = 1
GE = 2
LE = 3
EQ = 4
NE = 5
BIT_SET = 6
BIT_CLEAR = 7
CHANGED = 8
# WatchDataType
UINT8 = 0
UINT16 = 1
UINT32 = 2
UINT64 = 3
INT8 = 4
INT16 = 5
INT32 = 6
INT64 = 7
FLOAT32 = 8
FLOAT64 = 9
# DataCategory
STATIC_PARAM = 0
TUNABLE_PARAM = 1
STATE = 2
INPUT = 3
OUTPUT = 4
# GroupLogic (AND=0 already defined above)
OR = 1
# ActionType
COMMAND = 0
ARM_CONTROL = 1
# ActionTrigger (IMMEDIATE=0 conflicts with nothing)
IMMEDIATE = 0
AT_CYCLE = 1
AFTER_CYCLES = 2
AT_TIME = 3
ON_EVENT = 4
# SequenceType
RTS = 0
ATS = 1
# LogSeverity
INFO = 0
WARNING = 1
ERR = 2

