#   Fault 1 @ cycle 200 (20s):  HIGH temperature, hold 50 cycles (5s)
#   Fault 2 @ cycle 350 (35s):  FLIP temperatureRate, one-shot
#   Fault 3 @ cycle 400 (40s):  ZERO overtemp flag, hold 100 cycles (10s)
