# DataTransform (componentId=202, instanceIndex=0, fullUid=0xCA00)
# Total: 292 bytes (FaultCampaignTprm)
#
# Pre-defined fault injection campaign for the action demo.
# At boot, DataTransform reads this TPRM, generates an ATS from the fault
# entries, and loads it into the action engine via the internal bus.
# Each fault fires at its triggerCycle as an absolute cycle offset.
#
# Clock runs at 10 Hz, so 10 cycles = 1 second.
