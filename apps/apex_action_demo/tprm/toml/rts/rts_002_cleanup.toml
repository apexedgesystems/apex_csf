# RTS 002: Cleanup
#
# Clears all DataTransform fault injection entries. Started by RTS 001 via
# START_RTS on completion of the fault campaign. Manual start only (eventId=0).
#
# StandaloneSequenceTprm: 8-byte header + 16 steps x 84 bytes = 1352 bytes
#
# Components:
#   0xCA00: DataTransform

[__enums__]
# ActionType
COMMAND = 0
ARM_CONTROL = 1
# StepTimeoutPolicy
ABORT = 0
SKIP = 1
GOTO_STEP = 2
# StepCompletionAction
NEXT = 0
REPEAT = 1
START_RTS = 2
# WatchPredicate
EQ = 4
# WatchDataType
RAW = 10
# DataCategory
OUTPUT = 4

# ==============================================================================
# Header (8 bytes)
# ==============================================================================
[StandaloneSequenceTprm]
sequenceId   = { type = "uint", size = 2, value = 2 }
eventId      = { type = "uint", size = 2, value = 0 }
stepCount    = { type = "uint", size = 1, value = 1 }
repeatCount  = { type = "uint", size = 1, value = 0 }
type         = { type = "uint", size = 1, value = 0 }
armed        = { type = "uint", size = 1, value = 1 }

# ==============================================================================
# Step 0: CLEAR_ALL on DataTransform (0xCA00)
# ==============================================================================
[StandaloneSequenceTprm.step_0]
targetFullUid    = { type = "uint", size = 4, value = "0xCA00" }
targetCategory   = { type = "uint", size = 1, value = 0 }
targetByteOffset = { type = "uint", size = 2, value = 0 }
targetByteLen    = { type = "uint", size = 1, value = 0 }
