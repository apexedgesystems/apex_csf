# ==============================================================================
# docker-compose.ci.yml - CI runtime overlay
#
# Applied on top of docker-compose.yml in the CI workflow (via COMPOSE_FILE).
# It drops dev-cuda's GPU device reservation so the container starts on a
# GitHub runner, which has no GPU: the CUDA toolchain still compiles and links
# the .cu surface without a device, and make testp's GPU probe excludes the
# cuda-labeled tests there.
#
# It also binds /ccache to a host directory (./.ccache) instead of the
# apex-ccache named volume, so actions/cache can persist the compiler cache
# across runs -- runners are ephemeral, so the named volume is cold every run.
#
# Local runs use docker-compose.yml alone: GPU reservation kept, and ccache in
# the apex-ccache named volume.
# ==============================================================================

services:
  dev:
    volumes:
      - ./.ccache:/ccache
  # Lean tier for the rust/python/sanitize jobs; sanitize persists ccache.
  build-base:
    volumes:
      - ./.ccache:/ccache
  dev-cuda:
    deploy: !reset null
    volumes:
      - ./.ccache:/ccache
  # cuda-build has no GPU reservation to drop; it only needs the host ccache
  # bind so the build-test gate's compiler cache persists across runs.
  cuda-build:
    volumes:
      - ./.ccache:/ccache
